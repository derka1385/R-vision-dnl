const SubjectApp = ({ subject, user, onBack, onOpenAccount }) => {
  const { isMobile } = useViewport();
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const themesKey = `subj_${subject.id}_themes`;

  const [themes, setThemes] = useState(() => {
    const saved = localStorage.getItem(themesKey);
    if (saved) { try { return JSON.parse(saved); } catch {} }
    if (subject.id === "subj_dnl") return DNL_DEFAULT_THEMES;
    return [];
  });

  const saveThemes = (t) => {
    setThemes(t);
    localStorage.setItem(themesKey, JSON.stringify(t));
  };

  const addTheme = () => {
    const id = `th_${Date.now()}`;
    const next = [...themes, { id, titre:`Thème ${themes.length+1}`, sousThemes:[] }];
    saveThemes(next);
    setExpanded(prev => { const n=new Set(prev); n.add(id); return n; });
  };

  const deleteTheme = (themeId) => {
    if (!confirm("Supprimer ce thème et tous ses sous-thèmes ?")) return;
    const next = themes.filter(t => t.id!==themeId);
    saveThemes(next);
    if (activePath[0]===themeId) {
      const flat = next.flatMap(t => t.sousThemes.map(s => ({ tId:t.id, sId:s.id })));
      setActivePath(flat.length>0 ? [flat[0].tId, flat[0].sId] : [null,null]);
    }
  };

  const addST = (themeId) => {
    const id = `st_${Date.now()}`;
    const theme = themes.find(t => t.id===themeId);
    const newST = { id, titre:`Sous-thème ${(theme?.sousThemes?.length||0)+1}` };
    const next = themes.map(t => t.id===themeId ? { ...t, sousThemes:[...t.sousThemes, newST] } : t);
    saveThemes(next);
    setActivePath([themeId, id]);
    setTab("dossier");
  };

  const deleteST = (themeId, stId) => {
    if (!confirm("Supprimer ce sous-thème ?")) return;
    const next = themes.map(t => t.id===themeId ? { ...t, sousThemes:t.sousThemes.filter(s => s.id!==stId) } : t);
    saveThemes(next);
    if (activePath[1]===stId) {
      const flat = next.flatMap(t => t.sousThemes.map(s => ({ tId:t.id, sId:s.id })));
      setActivePath(flat.length>0 ? [flat[0].tId, flat[0].sId] : [null,null]);
    }
  };

  const allSTs = themes.flatMap(t => t.sousThemes.map(st => ({ themeId:t.id, st })));

  const [activePath, setActivePath] = useState(() => {
    if (themes.length>0 && themes[0].sousThemes.length>0)
      return [themes[0].id, themes[0].sousThemes[0].id];
    return [null,null];
  });
  const [tab, setTab] = useState("dossier");
  const [expanded, setExpanded] = useState(new Set());

  const [stTitles, setStTitles] = useState(() => {
    const init = {};
    themes.forEach(t => t.sousThemes.forEach(st => {
      const s = localStorage.getItem(`${st.id}_titre`);
      if (s) init[st.id] = s;
    }));
    return init;
  });

  useEffect(() => {
    const init = {};
    themes.forEach(t => t.sousThemes.forEach(st => {
      const s = localStorage.getItem(`${st.id}_titre`);
      if (s) init[st.id] = s;
    }));
    setStTitles(init);
  }, [themes]);

  const activeTheme = themes.find(t => t.id===activePath[0]);
  const activeST    = activeTheme?.sousThemes.find(s => s.id===activePath[1]);
  const currentIdx  = allSTs.findIndex(x => x.st.id===activePath[1]);

  const goTo = (idx) => {
    if (idx<0||idx>=allSTs.length) return;
    setActivePath([allSTs[idx].themeId, allSTs[idx].st.id]);
  };

  const TABS = ["dossier","mindmap","quiz"];

  return (
    <div style={{ height:"100vh", display:"flex", fontFamily:"'Plus Jakarta Sans',sans-serif", color:"#1a2332" }}>

      {isMobile && sidebarOpen && (
        <div onClick={() => setSidebarOpen(false)}
          style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.45)", zIndex:50 }} />
      )}

      <div style={
        isMobile
          ? { position:"fixed", top:0, left:0, bottom:0, zIndex:60,
              transform:sidebarOpen?"translateX(0)":"translateX(-100%)",
              transition:"transform .25s ease" }
          : { width:sidebarOpen?240:0, flexShrink:0, overflow:"hidden", transition:"width .25s ease" }
      }>
        <Sidebar
          themes={themes}
          activePath={activePath}
          onSelect={(tId,stId) => { setActivePath([tId,stId]); if(isMobile) setSidebarOpen(false); }}
          stTitles={stTitles}
          onAddTheme={addTheme}
          onDeleteTheme={deleteTheme}
          onAddST={addST}
          onDeleteST={deleteST}
          subjectNom={subject.nom}
          subjectSoustitre={subject.soustitre}
        />
      </div>

      {/* Colonne principale */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>

        {/* Barre du haut */}
        <header data-np style={{ height:52, flexShrink:0, background:"#fff", borderBottom:"1px solid #e2e6ed",
          display:"flex", alignItems:"center", padding:"0 16px", gap:10 }}>
          <button onClick={() => setSidebarOpen(o=>!o)}
            style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#5a6880", padding:"0 4px", flexShrink:0 }}>☰</button>

          <button onClick={onBack}
            style={{ display:"flex", alignItems:"center", gap:5, background:"none", border:"none",
              cursor:"pointer", color:"#8898b0", fontSize:13, padding:"5px 8px", borderRadius:6,
              transition:"all .15s", fontFamily:"inherit" }}
            onMouseEnter={e => { e.currentTarget.style.background="#f0f2f5"; e.currentTarget.style.color="#1a2332"; }}
            onMouseLeave={e => { e.currentTarget.style.background="none"; e.currentTarget.style.color="#8898b0"; }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            Lobby
          </button>

          <div style={{ width:1, height:18, background:"#dde1ea" }} />
          <div style={{ width:10, height:10, borderRadius:"50%", background:subject.couleur, flexShrink:0 }} />
          <span style={{ fontSize:15, fontWeight:700 }}>{subject.nom}</span>
          {!isMobile && subject.soustitre && <>
            <div style={{ width:1, height:18, background:"#dde1ea" }} />
            <span style={{ fontSize:13, color:"#5a6880" }}>{subject.soustitre}</span>
          </>}

          <div style={{ flex:1 }} />
          {!isMobile && allSTs.length>0 && <span style={{ fontSize:12, color:"#9aa3b0" }}>{currentIdx+1} / {allSTs.length}</span>}
          {!isMobile && <span style={{ fontSize:12, color:"#8898b0", maxWidth:160, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{user?.email}</span>}
          <button onClick={() => window.print()}
            style={{ padding:"5px 14px", background:"#f5f6f9", color:"#5a6880", border:"1px solid #d8dde8", borderRadius:5, cursor:"pointer", fontSize:13 }}>⬇ PDF</button>
          <button onClick={onOpenAccount}
            style={{ width:32, height:32, borderRadius:"50%",
              background:"linear-gradient(135deg,#2454A0,#1d3a7a)", border:"none",
              display:"flex", alignItems:"center", justifyContent:"center",
              color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer", flexShrink:0 }}>
            {(user?.email?.[0]||"?").toUpperCase()}
          </button>
        </header>

        <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>

            {allSTs.length===0 ? (
              <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                gap:16, color:"#8898b0", padding:40, textAlign:"center" }}>
                <div style={{ fontSize:52 }}>📂</div>
                <div style={{ fontSize:17, fontWeight:700, color:"#5a6880" }}>Aucun contenu</div>
                <div style={{ fontSize:14, maxWidth:280, lineHeight:1.6 }}>
                  Ajoute un thème depuis le menu latéral, puis des sous-thèmes pour commencer.
                </div>
              </div>
            ) : (
              <>
                {/* Fil d'Ariane + onglets */}
                <div style={{ background:"#fff", borderBottom:"1px solid #e2e6ed", padding:"12px 26px 0", flexShrink:0 }}>
                  <div style={{ fontSize:12, color:"#8898b0", marginBottom:8 }}>
                    {activeTheme && (localStorage.getItem(`theme_${activeTheme.id}_titre`)||activeTheme.titre)}
                    {" "}&rsaquo;{" "}
                    <span style={{ color:"#2d60a7" }}>{stTitles[activeST?.id]||activeST?.titre}</span>
                  </div>
                  <div data-np style={{ display:"flex", gap:0 }}>
                    {TABS.map(t => (
                      <button key={t} onClick={() => setTab(t)} style={{ padding:isMobile?"10px 18px":"7px 20px",
                        background:"none", border:"none", cursor:"pointer", fontSize:isMobile?15:14,
                        color:tab===t?"#2d60a7":"#8898b0", fontWeight:tab===t?600:400,
                        borderBottom:tab===t?"2px solid #2d60a7":"2px solid transparent",
                        textTransform:"capitalize" }}>
                        {t.charAt(0).toUpperCase()+t.slice(1)}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Contenu */}
                <div style={{ flex:1, minHeight:0, display:"flex", flexDirection:"column", overflow:"hidden" }}>
                  {tab==="dossier" && activeST && (
                    <div style={{ flex:1, overflowY:"auto" }}>
                      <DossierView key={activeST.id} st={activeST} sid={activeST.id}
                        onTitleChange={title => setStTitles(prev => ({ ...prev, [activeST.id]:title }))} />
                    </div>
                  )}
                  {tab==="mindmap" && activeST && <MindmapCanvas key={activeST.id} sid={activeST.id} />}
                  {tab==="quiz"    && activeST && <QuizView key={activeST.id} sid={activeST.id} />}
                </div>

                {/* Navigation bas */}
                <div data-np style={{ height:52, flexShrink:0, background:"#fff", borderTop:"1px solid #e2e6ed",
                  display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 26px" }}>
                  <button onClick={() => goTo(currentIdx-1)} disabled={currentIdx<=0}
                    style={{ padding:"6px 16px", borderRadius:6, border:"1px solid #d8dde8",
                      background:currentIdx>0?"#f5f6f9":"transparent",
                      color:currentIdx>0?"#1a2332":"#c4c9d4",
                      cursor:currentIdx>0?"pointer":"default", fontSize:14 }}>← Précédent</button>
                  <span style={{ fontSize:13, color:"#8898b0" }}>{currentIdx+1} / {allSTs.length}</span>
                  <button onClick={() => goTo(currentIdx+1)} disabled={currentIdx>=allSTs.length-1}
                    style={{ padding:"6px 18px", borderRadius:6,
                      border:`1px solid ${currentIdx<allSTs.length-1?"#2d60a7":"#d8dde8"}`,
                      background:currentIdx<allSTs.length-1?"#2d60a7":"transparent",
                      color:currentIdx<allSTs.length-1?"#fff":"#c4c9d4",
                      cursor:currentIdx<allSTs.length-1?"pointer":"default", fontSize:14 }}>Suivant →</button>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════════
//  APP PRINCIPALE
// ════════════════════════════════════════════════════════════════

const App = () => {
  const [user,      setUser]      = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [syncing,   setSyncing]   = useState(false);

  const [screen,          setScreen]          = useState("lobby");
  const [activeSubjectId, setActiveSubjectId] = useState(null);
  const [showAccount,     setShowAccount]     = useState(false);
  const [showAddSubject,  setShowAddSubject]  = useState(false);

  const SUBJECTS_KEY = "app_subjects";

  const [subjects, setSubjects] = useState(() => {
    try { const s=localStorage.getItem(SUBJECTS_KEY); return s?JSON.parse(s):DEFAULT_SUBJECTS; }
    catch { return DEFAULT_SUBJECTS; }
  });

  const saveSubjects = (s) => {
    setSubjects(s);
    localStorage.setItem(SUBJECTS_KEY, JSON.stringify(s));
  };

  const readSubjectThemes = (subjs) => {
    const map = {};
    subjs.forEach(subj => {
      const key = `subj_${subj.id}_themes`;
      const saved = localStorage.getItem(key);
      if (saved) { try { map[subj.id] = JSON.parse(saved); return; } catch {} }
      if (subj.id==="subj_dnl") { map[subj.id] = DNL_DEFAULT_THEMES; return; }
      map[subj.id] = [];
    });
    return map;
  };

  const [subjectThemes, setSubjectThemes] = useState(() => readSubjectThemes(
    (() => { try { const s=localStorage.getItem(SUBJECTS_KEY); return s?JSON.parse(s):DEFAULT_SUBJECTS; } catch { return DEFAULT_SUBJECTS; } })()
  ));

  // Auth
  useEffect(() => {
    _sb.auth.getSession().then(async ({ data:{ session } }) => {
      if (session?.user) {
        _uid = session.user.id;
        setSyncing(true);
        await loadUserData(session.user.id).catch(console.warn);
        _flushSyncQueue();
        setSyncing(false);
        setUser(session.user);
        const s = localStorage.getItem(SUBJECTS_KEY);
        if (s) { try { const parsed=JSON.parse(s); setSubjects(parsed); setSubjectThemes(readSubjectThemes(parsed)); } catch {} }
      }
      setAuthReady(true);
    });
    const { data:{ subscription } } = _sb.auth.onAuthStateChange(async (event, session) => {
      if (event==="SIGNED_IN" && session?.user) {
        if (_uid===session.user.id) { setUser(session.user); setAuthReady(true); return; }
        _uid = session.user.id;
        setSyncing(true);
        await loadUserData(session.user.id).catch(console.warn);
        _flushSyncQueue();
        setSyncing(false);
        setUser(session.user);
        setAuthReady(true);
        const s = localStorage.getItem(SUBJECTS_KEY);
        if (s) { try { const parsed=JSON.parse(s); setSubjects(parsed); setSubjectThemes(readSubjectThemes(parsed)); } catch {} }
      } else if (event==="SIGNED_OUT") {
        _uid = null; _clearLocalData(); setUser(null);
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  if (!authReady) return (
    <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      fontFamily:"'Plus Jakarta Sans',sans-serif", color:"#8898b0", fontSize:16, background:"#f0f2f5" }}>
      Chargement...
    </div>
  );
  if (!user) return <LoginScreen />;
  if (syncing) return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
      gap:14, fontFamily:"'Plus Jakarta Sans',sans-serif", color:"#8898b0", background:"#f0f2f5" }}>
      <div style={{ fontSize:36, animation:"blob1 1.5s linear infinite" }}>⟳</div>
      <div style={{ fontSize:15 }}>Synchronisation des données...</div>
    </div>
  );

  const addSubject = ({ nom, soustitre, couleur, emoji }) => {
    const id = `subj_${Date.now()}`;
    const newSubj = { id, nom, soustitre, couleur, emoji };
    const next = [...subjects, newSubj];
    saveSubjects(next);
    localStorage.setItem(`subj_${id}_themes`, JSON.stringify([]));
    setSubjectThemes(prev => ({ ...prev, [id]:[] }));
  };

  const deleteSubject = (id) => {
    if (!confirm("Supprimer cette matière et tout son contenu ?")) return;
    const next = subjects.filter(s => s.id!==id);
    saveSubjects(next);
    setSubjectThemes(prev => { const n={...prev}; delete n[id]; return n; });
  };

  const handleOpenSubject = (id) => {
    setActiveSubjectId(id);
    setScreen("subject");
  };

  const handleBack = () => {
    setSubjectThemes(readSubjectThemes(subjects));
    setScreen("lobby");
  };

  const activeSubject = subjects.find(s => s.id===activeSubjectId);

  return (
    <>
      {screen==="lobby" && (
        <SubjectLobby
          user={user}
          subjects={subjects}
          subjectThemes={subjectThemes}
          onOpenSubject={handleOpenSubject}
          onAddSubject={() => setShowAddSubject(true)}
          onDeleteSubject={deleteSubject}
          onOpenAccount={() => setShowAccount(true)}
        />
      )}
      {screen==="subject" && activeSubject && (
        <SubjectApp
          key={activeSubjectId}
          subject={activeSubject}
          user={user}
          onBack={handleBack}
          onOpenAccount={() => setShowAccount(true)}
        />
      )}
      {showAccount    && <AccountModal     user={user} onClose={() => setShowAccount(false)} />}
      {showAddSubject && <AddSubjectModal  onClose={() => setShowAddSubject(false)} onAdd={addSubject} />}
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
