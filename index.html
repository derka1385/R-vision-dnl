<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    (function () {
      const proto = Object.getPrototypeOf(window.localStorage);
      const nativeSet = proto.setItem;
      const nativeGet = proto.getItem;
      const nativeRemove = proto.removeItem;
      window.__cache = new Map();
      window.__origSet = function (k, v) {
        try { nativeSet.call(window.localStorage, k, v); window.__cache.delete(k); }
        catch (err) { window.__cache.set(k, v); }
      };
      window.__syncQueue = [];
      proto.setItem = function (k, v) {
        try { nativeSet.call(this, k, v); window.__cache.delete(k); }
        catch (err) { window.__cache.set(k, v); }
        if (typeof k !== "string") return;
        if (k.startsWith("sb-") || k.startsWith("supabase.")) return;
        if (window.__syncPush) window.__syncPush(k, v);
        else window.__syncQueue.push([k, v]);
      };
      proto.getItem = function (k) {
        const v = nativeGet.call(this, k);
        if (v !== null) return v;
        return window.__cache.has(k) ? window.__cache.get(k) : null;
      };
      proto.removeItem = function (k) {
        nativeRemove.call(this, k);
        window.__cache.delete(k);
      };
    })();
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; color: #1a2332; }
    h1, h2, h3, p { margin: 0; }
    button { font-family: inherit; }

    [contenteditable] { cursor: text; }
    [contenteditable]:hover { background: rgba(36,84,160,.05); border-radius: 2px; }
    [contenteditable]:focus { outline: 2px solid rgba(36,84,160,.25); outline-offset: 1px; border-radius: 2px; background: rgba(36,84,160,.04); }

      0%,100% { transform: translate(0,0) scale(1); }

    }
    @keyframes blob2 {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(-25px,20px) scale(1.04); }
      66% { transform: translate(20px,-15px) scale(0.97); }
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .anim-blob1 { animation: blob1 9s ease-in-out infinite; }
    .anim-blob2 { animation: blob2 11s ease-in-out infinite; }
    .anim-fadein { animation: fadeIn .35s ease both; }

    @media print {
      [data-np] { display: none !important; }
      body, html, #root { height: auto !important; overflow: visible !important; background: white; }
      #root > div { height: auto !important; overflow: visible !important; }
      .print-zone { overflow: visible !important; height: auto !important; }
    }

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ════════════════════════════════════════════════════════════════
//  SUPABASE
// ════════════════════════════════════════════════════════════════
const SUPABASE_URL = "https://bfxtjqevxdrewokaemzx.supabase.co";
const SUPABASE_KEY = "sb_publishable_F-8ef9orhZMCnTOGTfDlEg_KQc9pRyL";
const _sb  = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let   _uid = null;

const _clearLocalData = () => {
  const toDelete = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && !k.startsWith("sb-") && !k.startsWith("supabase.")) toDelete.push(k);
  }
  toDelete.forEach(k => localStorage.removeItem(k));
  if (window.__cache) window.__cache.clear();
};

const _origSet = window.__origSet || ((k, v) => localStorage.setItem(k, v));

window.__syncPush = (k, v) => {
  if (!_uid) return;
  const isImg = k.startsWith("img_");
  const row = isImg
    ? { user_id:_uid, key:k.slice(4), data:v }
    : { user_id:_uid, key:k, value:v };
  _sb.from(isImg ? "images" : "content")
     .upsert(row, { onConflict: "user_id,key" })
     .then(({ error }) => { if (error) console.warn("⚡sync:", error.message, k); })
     .catch(e => console.warn("⚡sync:", e));
};

const _flushSyncQueue = () => {
  const q = window.__syncQueue || [];
  window.__syncQueue = [];
  q.forEach(([k, v]) => window.__syncPush(k, v));
};

const loadUserData = async (uid) => {
  _clearLocalData();
  const [{ data:rows, error:e1 }, { data:imgs, error:e2 }] = await Promise.all([
    _sb.from("content").select("key,value").eq("user_id", uid),
    _sb.from("images").select("key,data").eq("user_id", uid),
  ]);
  if (e1) console.warn("content:", e1.message);
  if (e2) console.warn("images:", e2.message);
  if (rows) rows.forEach(r => { try { _origSet(r.key, r.value); } catch {} });
  if (imgs) imgs.forEach(r => { try { _origSet("img_"+r.key, r.data); } catch {} });
};

const DB = {
  read:    k      => { try { return localStorage.getItem(k); }               catch { return null; } },
  write:   (k,v)  => { try { localStorage.setItem(k, v); }                   catch {} },
  readJ:   (k,fb) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):fb; } catch { return fb; } },
  writeJ:  (k,v)  => { try { localStorage.setItem(k,JSON.stringify(v)); }    catch {} },
  readImg: k      => { try { return localStorage.getItem("img_"+k); }        catch { return null; } },
  writeImg:(k,v)  => { try { localStorage.setItem("img_"+k,v); }             catch {} },
};

const useViewport = () => {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return { isMobile: w < 768, isTablet: w >= 768 && w < 1024 };
};

// ════════════════════════════════════════════════════════════════
//  DONNÉES MATIÈRES
// ════════════════════════════════════════════════════════════════

const SUBJECT_COLORS = ["#2454A0","#B85820","#2a8a4a","#7a3a9a","#1a7a7a","#c44020","#4a6a9a","#8a6a20"];
const SUBJECT_EMOJIS = ["📚","🔬","📐","🌍","📖","🎨","💻","🏛"];

const DNL_DEFAULT_THEMES = [
  { id:"t1", titre:"Titre du Thème 1", sousThemes:[
    { id:"t1s1", titre:"Titre du Sous-thème 1.1" },
    { id:"t1s2", titre:"Titre du Sous-thème 1.2" },
  ]},
  { id:"t2", titre:"Titre du Thème 2", sousThemes:[
    { id:"t2s1", titre:"Titre du Sous-thème 2.1" },
    { id:"t2s2", titre:"Titre du Sous-thème 2.2" },
    { id:"t2s3", titre:"Titre du Sous-thème 2.3" },
    { id:"t2s4", titre:"Titre du Sous-thème 2.4" },
  ]},
  { id:"t3", titre:"Titre du Thème 3", sousThemes:[
    { id:"t3s1", titre:"Titre du Sous-thème 3.1" },
  ]},
];

const DEFAULT_SUBJECTS = [
  { id:"subj_dnl", nom:"DNL", soustitre:"Geschichte & Géographie", couleur:"#2454A0", emoji:"🌍" }
];

// ════════════════════════════════════════════════════════════════
//  COMPOSANTS PARTAGÉS
// ════════════════════════════════════════════════════════════════

const E = ({ defaultVal, storageKey, tag = "div", ph = "Cliquez pour éditer", style = {}, onChange }) => {
  const Elem = tag;
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const saved = localStorage.getItem(storageKey);
    ref.current.textContent = saved !== null ? saved : (defaultVal || "");
  }, [storageKey]);
  const save = () => {
    if (!ref.current) return;
    const val = ref.current.textContent;
    localStorage.setItem(storageKey, val);
    onChange?.(val);
  };
  return (
    <Elem ref={ref} contentEditable suppressContentEditableWarning
      onBlur={save} data-ph={ph} style={{ outline:"none", ...style }} />
  );
};

const ImgSlot = ({ storageKey, height = 140 }) => {
  const [src, setSrc] = useState(() => {
    try { return localStorage.getItem("img_" + storageKey) || null; } catch { return null; }
  });
  const charger = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const r = new FileReader();
    r.onload = (e) => {
      setSrc(e.target.result);
      try { localStorage.setItem("img_" + storageKey, e.target.result); } catch {}
    };
    r.readAsDataURL(file);
  };
  return (
    <div onClick={() => { const i=document.createElement("input"); i.type="file"; i.accept="image/*"; i.onchange=e=>charger(e.target.files[0]); i.click(); }}
      onDrop={(e) => { e.preventDefault(); charger(e.dataTransfer.files[0]); }}
      onDragOver={(e) => e.preventDefault()}
      style={{ width:"100%", height, borderRadius:4, overflow:"hidden", cursor:"pointer", position:"relative",
        background: src ? "#000" : "repeating-linear-gradient(45deg,#e6e8ec,#e6e8ec 2px,#f3f4f6 2px,#f3f4f6 12px)",
        border: src ? "none" : "2px dashed #c4c9d4",
        display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      {src
        ? <img src={src} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
        : <div style={{ color:"#9aa3b0", fontSize:13, textAlign:"center", padding:10, userSelect:"none" }}>📷<br/>Cliquer ou glisser une image</div>}
      {src && <div style={{ position:"absolute", top:6, right:6, background:"rgba(0,0,0,.55)", color:"#fff", fontSize:11, padding:"2px 7px", borderRadius:3, pointerEvents:"none" }}>✎ remplacer</div>}
    </div>
  );
};

const NumDoc = ({ n, color }) => (
  <span style={{ display:"inline-flex", width:22, height:22, flexShrink:0, background:color, color:"#fff",
    borderRadius:4, alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, marginRight:7 }}>{n}</span>
);

// ════════════════════════════════════════════════════════════════
//  ANNOTATEUR PDF (PDF.js chargé à la demande)
// ════════════════════════════════════════════════════════════════

const PDFJS_VER    = "3.11.174";
const PDFJS_CDN    = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.min.js`;
const PDFJS_WORKER = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.worker.min.js`;

const loadPDFJS = () => new Promise((resolve, reject) => {
  if (window.pdfjsLib) { window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER; resolve(window.pdfjsLib); return; }
  const s = document.createElement("script"); s.src = PDFJS_CDN;
  s.onload = () => { window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER; resolve(window.pdfjsLib); };
  s.onerror = () => reject(new Error("Impossible de charger PDF.js"));
  document.head.appendChild(s);
});

// Paramètres des outils d'annotation
const ANNOT_TOOLS = {
  stylo:     { label:"✏ Stylo",     wFactor:2, alpha:1, comp:"source-over",    cursor:"crosshair", pressure:true                },
  surligner: { label:"▬ Surligner", alpha:0.38,          comp:"source-over",    cursor:"crosshair",               mode:"rect"   },
  souligner: { label:"_ Souligner", alpha:1,              comp:"source-over",    cursor:"crosshair",               mode:"rect"   },
  gomme:     { label:"◯ Gomme",     wFactor:8, alpha:1, comp:"destination-out",cursor:"cell",      pressure:false               },
};
const PEN_COLORS = ["#1a2332","#2454A0","#dc2626","#16a34a","#d97706"];
const HL_COLORS  = ["#fbbf24","#86efac","#93c5fd","#f9a8d4","#c4b5fd"];

// ── Page PDF avec calque annotation ─────────────────────────────
const PDFPageView = ({ page, pageIdx, annotKey, tool, color, penSize, onRegister, editMode }) => {
  const pdfRef     = useRef(null);
  const annotRef   = useRef(null);
  const previewRef = useRef(null);  // preview de sélection pour surligner/souligner
  const vpRef      = useRef(null);  // viewport stocké pour conversion coords
  const histRef    = useRef([]);
  const drawing    = useRef(false);
  const selStart   = useRef(null);  // point de départ pour sélection rect
  const [ready, setReady] = useState(false);

  const isRectTool = editMode && ANNOT_TOOLS[tool]?.mode === "rect";
  const isFreehand = editMode && !isRectTool;
  const cfg        = ANNOT_TOOLS[tool] || ANNOT_TOOLS.stylo;

  // ── Rendu PDF haute résolution + chargement positions texte ─────
  useEffect(() => {
    if (!page || !pdfRef.current) return;
    const dpr   = window.devicePixelRatio || 1;
    const SCALE = 2.5;
    const vp    = page.getViewport({ scale: SCALE });
    vpRef.current = vp;
    const cv    = pdfRef.current;
    cv.width  = Math.floor(vp.width  * dpr);
    cv.height = Math.floor(vp.height * dpr);
    cv.style.width  = "100%";
    cv.style.height = "auto";
    const ctx = cv.getContext("2d");
    ctx.scale(dpr, dpr);
    page.render({ canvasContext: ctx, viewport: vp }).promise
      .then(() => {
        setReady(true);
      })
      .catch(console.warn);
  }, [page]);

  // ── Init calques annotation + preview ──────────────────────────
  useEffect(() => {
    if (!ready || !annotRef.current || !pdfRef.current) return;
    const pc = pdfRef.current;
    [annotRef.current, previewRef.current].filter(Boolean).forEach(c => {
      c.width = pc.width; c.height = pc.height;
      c.style.width = "100%"; c.style.height = "100%";
    });
    const ac = annotRef.current;
    const ctx = ac.getContext("2d");
    ctx.clearRect(0, 0, ac.width, ac.height);
    const saved = localStorage.getItem(`img_annot_${annotKey}_p${pageIdx}`);
    const finalize = () => { histRef.current = [ac.toDataURL("image/png")]; };
    if (saved) {
      const img = new Image();
      img.onload  = () => { ctx.drawImage(img, 0, 0); finalize(); };
      img.onerror = finalize;
      img.src = saved;
    } else { finalize(); }
  }, [ready, annotKey, pageIdx]);

  // ── API undo/clear ─────────────────────────────────────────────
  useEffect(() => {
    if (!ready || !annotRef.current) return;
    onRegister(pageIdx, {
      undo: () => {
        if (histRef.current.length <= 1 || !annotRef.current) return false;
        histRef.current.pop();
        const prev = histRef.current[histRef.current.length - 1];
        const ctx = annotRef.current.getContext("2d");
        ctx.clearRect(0, 0, annotRef.current.width, annotRef.current.height);
        const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = prev;
        if (histRef.current.length === 1) localStorage.removeItem(`img_annot_${annotKey}_p${pageIdx}`);
        else localStorage.setItem(`img_annot_${annotKey}_p${pageIdx}`, prev);
        return true;
      },
      clear: () => {
        if (!annotRef.current) return;
        const ctx = annotRef.current.getContext("2d");
        ctx.clearRect(0, 0, annotRef.current.width, annotRef.current.height);
        histRef.current = [annotRef.current.toDataURL("image/png")];
        localStorage.removeItem(`img_annot_${annotKey}_p${pageIdx}`);
      },
    });
  }, [ready, annotKey, pageIdx, tool, color, penSize, onRegister]);

  // ── Dessin libre (stylo / gomme) ───────────────────────────────
  const getPos = (e) => {
    const ac = annotRef.current;
    if (!ac) return { x:0, y:0, p:0.5 };
    const rect = ac.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (ac.width / rect.width),
      y: (e.clientY - rect.top)  * (ac.height / rect.height),
      p: Math.max(0.05, e.pressure || 0.5),
    };
  };

  const applyCtx = (ctx, pressure = 0.5) => {
    const dpr = window.devicePixelRatio || 1;
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.globalCompositeOperation = cfg.comp;
    ctx.strokeStyle = tool === "gomme" ? "rgba(0,0,0,1)" : color;
    ctx.globalAlpha = cfg.alpha;
    ctx.lineWidth   = penSize * cfg.wFactor * (cfg.pressure ? (0.4 + pressure * 1.4) : 1) * dpr;
  };

  const onDown = (e) => {
    if (!annotRef.current) return;
    e.preventDefault();
    try { annotRef.current.setPointerCapture(e.pointerId); } catch {}
    drawing.current = true;
    const pos = getPos(e);
    const ctx = annotRef.current.getContext("2d");
    applyCtx(ctx, pos.p);
    ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
  };

  const onMove = (e) => {
    if (!drawing.current || !annotRef.current) return;
    e.preventDefault();
    const pos = getPos(e);
    const ctx = annotRef.current.getContext("2d");
    applyCtx(ctx, pos.p);
    ctx.lineTo(pos.x, pos.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
  };

  const onUp = (e) => {
    if (!drawing.current || !annotRef.current) return;
    drawing.current = false;
    const dataURL = annotRef.current.toDataURL("image/png");
    histRef.current = [...histRef.current, dataURL];
    localStorage.setItem(`img_annot_${annotKey}_p${pageIdx}`, dataURL);
  };

  // ── Sélection rectangulaire + détection texte (surligner/souligner) ──
  const getVPPos = (e) => {
    const cv = pdfRef.current, vp = vpRef.current;
    if (!cv || !vp) return { x:0, y:0 };
    const rect = cv.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * vp.width  / rect.width,
      y: (e.clientY - rect.top)  * vp.height / rect.height,
    };
  };

  const onRectDown = (e) => {
    e.preventDefault();
    try { previewRef.current?.setPointerCapture(e.pointerId); } catch {}
    selStart.current = getVPPos(e);
  };

  const onRectMove = (e) => {
    if (!selStart.current || !previewRef.current) return;
    e.preventDefault();
    const dpr = window.devicePixelRatio || 1;
    const pos = getVPPos(e);
    const ctx = previewRef.current.getContext("2d");
    ctx.clearRect(0, 0, previewRef.current.width, previewRef.current.height);
    const x1 = Math.min(selStart.current.x, pos.x) * dpr;
    const y1 = Math.min(selStart.current.y, pos.y) * dpr;
    const w  = Math.abs(pos.x - selStart.current.x) * dpr;
    const h  = Math.abs(pos.y - selStart.current.y) * dpr;
    ctx.save();
    ctx.globalAlpha = 0.15; ctx.fillStyle = color;
    ctx.fillRect(x1, y1, w, h);
    ctx.globalAlpha = 0.7;  ctx.strokeStyle = color;
    ctx.lineWidth = 1.5 * dpr; ctx.setLineDash([5*dpr, 3*dpr]);
    ctx.strokeRect(x1, y1, w, h);
    ctx.restore();
  };

  const onRectUp = (e) => {
    if (!selStart.current || !annotRef.current || !previewRef.current) return;
    previewRef.current.getContext("2d")
      .clearRect(0, 0, previewRef.current.width, previewRef.current.height);

    const pos = getVPPos(e);
    const dpr = window.devicePixelRatio || 1;
    const x   = Math.min(selStart.current.x, pos.x) * dpr;
    const y   = Math.min(selStart.current.y, pos.y) * dpr;
    const w   = Math.abs(pos.x - selStart.current.x) * dpr;
    const h   = Math.abs(pos.y - selStart.current.y) * dpr;
    selStart.current = null;
    if (w < 2 || h < 2) return;

    const ctx = annotRef.current.getContext("2d");
    ctx.save();
    if (tool === "surligner") {
      ctx.globalAlpha = 0.38;
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    } else { // souligner : ligne en bas du rectangle
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = color;
      ctx.lineWidth   = 2.5 * dpr;
      ctx.lineCap     = "round";
      ctx.beginPath();
      ctx.moveTo(x,     y + h);
      ctx.lineTo(x + w, y + h);
      ctx.stroke();
    }
    ctx.restore();

    const dataURL = annotRef.current.toDataURL("image/png");
    histRef.current = [...histRef.current, dataURL];
    localStorage.setItem(`img_annot_${annotKey}_p${pageIdx}`, dataURL);
  };

  return (
    <div style={{ position:"relative", marginBottom:10, background:"#fff",
      boxShadow:"0 2px 10px rgba(0,0,0,.1)", borderRadius:3, overflow:"hidden" }}>
      <div style={{ position:"absolute", top:6, left:8, fontSize:10,
        color:"rgba(0,0,0,.25)", pointerEvents:"none", zIndex:4 }}>
        p.{pageIdx+1}
      </div>
      <canvas ref={pdfRef} style={{ display:"block", width:"100%", height:"auto" }} />
      {ready && (
        <canvas ref={annotRef}
          style={{ position:"absolute", inset:0, width:"100%", height:"100%",
            touchAction:   isFreehand ? "none"    : "auto",
            cursor:        isFreehand ? cfg.cursor : "default",
            pointerEvents: isFreehand ? "auto"     : "none",
            zIndex: 1 }}
          onPointerDown={isFreehand ? onDown : undefined}
          onPointerMove={isFreehand ? onMove : undefined}
          onPointerUp={isFreehand ? onUp : undefined}
          onPointerLeave={isFreehand ? onUp : undefined}
        />
      )}
      {ready && (
        <canvas ref={previewRef}
          style={{ position:"absolute", inset:0, width:"100%", height:"100%",
            touchAction:   isRectTool ? "none"       : "auto",
            cursor:        isRectTool ? "crosshair"  : "default",
            pointerEvents: isRectTool ? "auto"       : "none",
            zIndex: 2 }}
          onPointerDown={isRectTool ? onRectDown : undefined}
          onPointerMove={isRectTool ? onRectMove : undefined}
          onPointerUp={isRectTool ? onRectUp : undefined}
          onPointerLeave={isRectTool ? onRectUp : undefined}
        />
      )}
    </div>
  );
};

// ── Annotateur PDF complet (toolbar + pages) ─────────────────────
const PDFAnnotator = ({ pdfData, pdfName, annotKey, onRemove }) => {
  const [pdfPages,    setPdfPages]    = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [loadError,   setLoadError]   = useState("");
  const [tool,        setTool]        = useState("stylo");
  const [color,       setColor]       = useState(PEN_COLORS[0]);
  const [penSize,     setPenSize]     = useState(2);
  const [fullscreen,  setFullscreen]  = useState(false);
  const [editMode,    setEditMode]    = useState(false);
  const [zoom,        setZoom]        = useState(1);
  const pageAPIs    = useRef({});
  const containerRef = useRef(null);
  const zoomRef      = useRef(1);
  useEffect(() => { zoomRef.current = zoom; }, [zoom]);

  // Zoom Ctrl+molette sur le conteneur de pages
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const onWheel = (e) => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        setZoom(z => Math.max(0.3, Math.min(3, z * (e.deltaY < 0 ? 1.1 : 0.9))));
      }
    };
    el.addEventListener("wheel", onWheel, { passive: false });
    return () => el.removeEventListener("wheel", onWheel);
  }, []);

  // Chargement PDF.js + rendu des pages
  useEffect(() => {
    if (!pdfData) return;
    setLoading(true); setLoadError(""); setPdfPages([]);
    loadPDFJS()
      .then(lib => lib.getDocument(pdfData).promise)
      .then(async pdf => {
        const pages = [];
        for (let i = 1; i <= pdf.numPages; i++) pages.push(await pdf.getPage(i));
        setPdfPages(pages); setLoading(false);
      })
      .catch(e => { setLoadError("Erreur : " + e.message); setLoading(false); });
  }, [pdfData]);

  const registerPage = (idx, api) => { pageAPIs.current[idx] = api; };

  const handleUndo = () => {
    for (let i = pdfPages.length - 1; i >= 0; i--)
      if (pageAPIs.current[i]?.undo()) break;
  };

  const handleClearAll = () => {
    if (!confirm("Effacer toutes les annotations de ce document ?")) return;
    Object.values(pageAPIs.current).forEach(api => api?.clear());
  };

  const isHl      = tool === "surligner";
  const colorSet  = isHl ? HL_COLORS : PEN_COLORS;

  const handleToolChange = (t) => {
    setTool(t);
    if      (t === "surligner") setColor(HL_COLORS[0]);
    else if (t !== "gomme")     setColor(PEN_COLORS[0]);
  };

  const toolbar = (
    <div style={{ background:"#fff", borderBottom:"1px solid #e2e6ed", padding:"7px 12px",
      display:"flex", alignItems:"center", gap:7, flexWrap:"wrap", flexShrink:0 }}>

      {/* Toggle Visualiser / Annoter */}
      <div style={{ display:"flex", border:"1.5px solid #e2e6ed", borderRadius:8, overflow:"hidden", flexShrink:0 }}>
        <button onClick={() => setEditMode(false)}
          style={{ padding:"5px 13px", background:!editMode?"#1d2b42":"#f8f9fc",
            color:!editMode?"#fff":"#5a6880", border:"none", cursor:"pointer",
            fontSize:12, fontFamily:"inherit", fontWeight:!editMode?700:400,
            transition:"all .15s", whiteSpace:"nowrap" }}>
          👁 Visualiser
        </button>
        <button onClick={() => setEditMode(true)}
          style={{ padding:"5px 13px", background:editMode?"#2454A0":"#f8f9fc",
            color:editMode?"#fff":"#5a6880", border:"none", cursor:"pointer",
            fontSize:12, fontFamily:"inherit", fontWeight:editMode?700:400,
            transition:"all .15s", whiteSpace:"nowrap" }}>
          ✏ Annoter
        </button>
      </div>

      {/* Séparateur */}
      {editMode && <div style={{ width:1, height:20, background:"#e2e6ed", flexShrink:0 }} />}

      {/* Outils — visibles seulement en mode annotation */}
      {editMode && Object.entries(ANNOT_TOOLS).map(([key, cfg]) => (
        <button key={key} onClick={() => handleToolChange(key)}
          style={{ padding:"4px 10px", borderRadius:6,
            border:`1.5px solid ${tool===key?"#2454A0":"#e2e6ed"}`,
            background:tool===key?"#eef2fc":"#f8f9fc",
            color:tool===key?"#2454A0":"#5a6880",
            cursor:"pointer", fontSize:12, fontWeight:tool===key?700:400,
            fontFamily:"inherit", transition:"all .12s", whiteSpace:"nowrap" }}>
          {cfg.label}
        </button>
      ))}

      {editMode && <div style={{ width:1, height:20, background:"#e2e6ed", flexShrink:0 }} />}

      {/* Couleurs */}
      {editMode && tool !== "gomme" && colorSet.map(c => (
        <div key={c} onClick={() => setColor(c)}
          style={{ width:20, height:20, borderRadius:"50%", background:c, cursor:"pointer", flexShrink:0,
            outline:`2.5px solid ${color===c?c:"transparent"}`, outlineOffset:2,
            transform:color===c?"scale(1.18)":"scale(1)", transition:"all .12s" }} />
      ))}

      {editMode && tool !== "gomme" && <div style={{ width:1, height:20, background:"#e2e6ed", flexShrink:0 }} />}

      {/* Épaisseur */}
      {editMode && tool !== "gomme" && [1, 2, 4].map(s => (
        <div key={s} onClick={() => setPenSize(s)}
          style={{ width:20+s*2, height:20+s*2, borderRadius:"50%",
            background:penSize===s?"#2454A0":"#e8ecf2",
            cursor:"pointer", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center",
            transition:"all .12s" }}>
          <div style={{ width:s*2, height:s*2, borderRadius:"50%", background:penSize===s?"#fff":"#8898b0" }} />
        </div>
      ))}

      {/* Zoom */}
      <div style={{ width:1, height:20, background:"#e2e6ed", flexShrink:0 }} />
      <div style={{ display:"flex", alignItems:"center", gap:3, flexShrink:0 }}>
        <button onClick={() => setZoom(z => Math.max(0.3, z * 0.85))}
          style={{ width:26, height:26, borderRadius:5, border:"1px solid #d8dde8", background:"#f8f9fc",
            color:"#5a6880", cursor:"pointer", fontSize:14, lineHeight:1, fontFamily:"inherit" }}>−</button>
        <button onClick={() => setZoom(1)}
          style={{ padding:"0 7px", height:26, borderRadius:5, border:"1px solid #d8dde8", background:"#f8f9fc",
            color:"#5a6880", cursor:"pointer", fontSize:11, minWidth:44, fontFamily:"inherit" }}>
          {Math.round(zoom * 100)}%
        </button>
        <button onClick={() => setZoom(z => Math.min(3, z * 1.15))}
          style={{ width:26, height:26, borderRadius:5, border:"1px solid #d8dde8", background:"#f8f9fc",
            color:"#5a6880", cursor:"pointer", fontSize:14, lineHeight:1, fontFamily:"inherit" }}>+</button>
      </div>

      <div style={{ flex:1 }} />

      {/* Undo / Clear — seulement en mode annotation */}
      {editMode && <>
        <button onClick={handleUndo}
          style={{ padding:"4px 10px", borderRadius:6, border:"1px solid #d8dde8",
            background:"#f8f9fc", color:"#5a6880", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>
          ↩ Annuler
        </button>
        <button onClick={handleClearAll}
          style={{ padding:"4px 10px", borderRadius:6, border:"1px solid #fecaca",
            background:"#fff5f5", color:"#dc2626", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>
          🗑 Effacer tout
        </button>
      </>}

      {/* Plein écran + Retirer — toujours visibles */}
      <button onClick={() => setFullscreen(f=>!f)}
        style={{ padding:"4px 10px", borderRadius:6, border:"1px solid #d8dde8",
          background:"#f8f9fc", color:"#5a6880", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>
        {fullscreen ? "✕ Réduire" : "⤢ Plein écran"}
      </button>
      {onRemove && (
        <button onClick={onRemove}
          style={{ padding:"4px 10px", borderRadius:6, border:"1px solid #d8dde8",
            background:"#f8f9fc", color:"#5a6880", cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>
          Retirer PDF
        </button>
      )}
    </div>
  );

  const pagesList = (
    <div ref={containerRef} style={{ flex:1, overflowY:"auto", overflowX:"auto", padding:"12px 16px", background:"#f0f2f5", minHeight:0 }}>
      {loading && (
        <div style={{ textAlign:"center", padding:"60px 20px", color:"#8898b0" }}>
          <div style={{ fontSize:28, marginBottom:10 }}>⟳</div>
          <div style={{ fontSize:13 }}>Chargement du PDF…</div>
          <div style={{ fontSize:11, marginTop:6, color:"#b8c0cc" }}>PDF.js se charge depuis le CDN</div>
        </div>
      )}
      {loadError && (
        <div style={{ padding:16, background:"#fef2f2", borderRadius:8, color:"#dc2626", fontSize:13 }}>{loadError}</div>
      )}
      {!loading && !loadError && (
        <div style={{ width:`${Math.round(zoom * 100)}%`, minWidth:"30%", margin:"0 auto" }}>
          {pdfPages.map((page, idx) => (
            <PDFPageView key={idx} page={page} pageIdx={idx}
              annotKey={annotKey} tool={tool} color={color} penSize={penSize}
              onRegister={registerPage} editMode={editMode} />
          ))}
        </div>
      )}
    </div>
  );

  if (fullscreen) {
    return ReactDOM.createPortal(
      <div style={{ position:"fixed", inset:0, zIndex:9999, background:"#f0f2f5",
        display:"flex", flexDirection:"column", fontFamily:"'Plus Jakarta Sans',sans-serif" }}>
        {toolbar}{pagesList}
      </div>,
      document.body
    );
  }

  return (
    <div style={{ border:"1px solid #e2e6ed", borderRadius:8, overflow:"hidden",
      height:600, display:"flex", flexDirection:"column" }}>
      {toolbar}{pagesList}
    </div>
  );
};

const DossierView = ({ st, sid, onTitleChange }) => {
  const k = (id) => sid + "_" + id;
  const pdfKey = k("pdf");
  const pdfNameKey = k("pdfname");
  const { isMobile } = useViewport();

  const [pdf, setPdf] = useState(() => { try { return localStorage.getItem(pdfKey) || null; } catch { return null; } });
  const [pdfName, setPdfName] = useState(() => { try { return localStorage.getItem(pdfNameKey) || ""; } catch { return ""; } });
  const [dragOver, setDragOver] = useState(false);

  const loadPdf = (file) => {
    if (!file) return;
    if (file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) { alert("Merci de déposer un fichier PDF."); return; }
    const r = new FileReader();
    r.onload = e => {
      const data = e.target.result;
      setPdf(data); setPdfName(file.name);
      try { localStorage.setItem(pdfKey, data); } catch { alert("PDF trop volumineux pour être stocké."); }
      try { localStorage.setItem(pdfNameKey, file.name); } catch {}
    };
    r.readAsDataURL(file);
  };

  const clearPdf = () => {
    setPdf(null); setPdfName("");
    try { localStorage.removeItem(pdfKey); } catch {}
    try { localStorage.removeItem(pdfNameKey); } catch {}
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", padding:"20px 26px", gap:22 }}>
      <div>
        <E defaultVal={st.titre} storageKey={k("titre")} tag="h1" ph="Titre du sous-thème"
          style={{ fontSize:22, fontWeight:700, lineHeight:1.2 }} onChange={onTitleChange} />
      </div>

      <div>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
          <span style={{ fontSize:15, fontWeight:700 }}>📄 Document PDF</span>
          <div style={{ flex:1, height:1, background:"#e2e6ed" }} />
        </div>
        {pdf ? (
          <PDFAnnotator pdfData={pdf} pdfName={pdfName} annotKey={sid} onRemove={clearPdf} />
        ) : (
          <div onClick={() => { const i=document.createElement("input"); i.type="file"; i.accept="application/pdf"; i.onchange=e=>loadPdf(e.target.files[0]); i.click(); }}
            onDrop={e => { e.preventDefault(); setDragOver(false); loadPdf(e.dataTransfer.files[0]); }}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            style={{ border:`2px dashed ${dragOver?"#2d60a7":"#c4c9d4"}`, borderRadius:6, padding:"50px 20px", textAlign:"center",
              background:dragOver?"#eaf1fb":"#fafbfc", cursor:"pointer", color:"#5a6880", fontSize:14, transition:"all .15s" }}>
            <div style={{ fontSize:32, marginBottom:8 }}>📄</div>
            <div style={{ fontWeight:600, marginBottom:4 }}>Glisser un PDF ici</div>
            <div style={{ fontSize:12, color:"#8898b0" }}>ou cliquer pour parcourir</div>
          </div>
        )}
      </div>

      <div style={{ borderTop:"2px solid #e2e6ed", paddingTop:20 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>
          <span style={{ fontSize:15, fontWeight:700 }}>✍ Dissertation finale</span>
          <div style={{ flex:1, height:1, background:"#e2e6ed" }} />
        </div>
        <div style={{ background:"#f5f6f9", border:"1px dashed #c4c9d4", borderRadius:4, padding:"10px 14px", marginBottom:16, display:"flex", gap:8, alignItems:"center" }}>
          <span style={{ fontSize:13, color:"#8898b0", flexShrink:0 }}>Sujet :</span>
          <E defaultVal={st.dissertation || ""} storageKey={k("diss")} tag="span"
            ph="Sujet de la dissertation..." style={{ fontSize:14, color:"#1a2332", fontWeight:500, flex:1 }} />
        </div>
        <E defaultVal="" storageKey={k("disstxt")} tag="div" ph="Rédiger la dissertation ici..."
          style={{ fontSize:14, lineHeight:1.8, color:"#1a2332", minHeight:300, padding:"12px 14px",
            border:"1px solid #e2e6ed", borderRadius:4, background:"#fff" }} />
      </div>
    </div>
  );
};

const Lightbox = ({ src, type, name, onClose }) => {
  useEffect(() => {
    const onKey = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => { document.removeEventListener("keydown", onKey); document.body.style.overflow = ""; };
  }, []);
  return ReactDOM.createPortal(
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.93)", zIndex:10000,
      display:"flex", alignItems:"center", justifyContent:"center", padding:"50px 20px 20px" }}>
      <button onClick={onClose} style={{ position:"absolute", top:14, right:18, background:"rgba(255,255,255,.15)", color:"#fff",
        border:"none", borderRadius:6, width:40, height:40, fontSize:22, cursor:"pointer", lineHeight:1 }}>×</button>
      {type === "pdf"
        ? <object data={src} type="application/pdf" onClick={e=>e.stopPropagation()}
            style={{ width:"100%", height:"100%", background:"#fff", borderRadius:4 }}>
            <div style={{ padding:20, textAlign:"center", color:"#fff" }}>
              Impossible d'afficher. <a href={src} download={name||"document.pdf"} style={{color:"#74aadf"}}>Télécharger</a>
            </div>
          </object>
        : <img src={src} alt="" onClick={e=>e.stopPropagation()}
            style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", borderRadius:4 }} />
      }
    </div>,
    document.body
  );
};

const CARD_COLORS = ["#3b6ea5","#c96a2a","#5b8a3a","#8b4a9a","#2a8a7a","#6b7890","#a04040","#c0983a"];

const CANVAS_DEFAULTS = [
  { id:"lf",  title:"Leitfrage",          color:"#c96a2a", x:20,  y:20,  w:520, h:130, type:"text",  content:"Problématique à synthétiser..." },
  { id:"bg",  title:"Schlüsselbegriffe",  color:"#3b6ea5", x:20,  y:170, w:280, h:320, type:"text",  content:"• Begriff 1\n• Begriff 2\n• Begriff 3" },
  { id:"map", title:"Karte / Schéma",     color:"#5b8a3a", x:320, y:170, w:280, h:320, type:"image" },
  { id:"arg", title:"Hauptargumente",     color:"#8b4a9a", x:620, y:20,  w:480, h:470, type:"text",  content:"Argument 1...\n\nArgument 2...\n\nArgument 3..." },
  { id:"bil", title:"Bilan",              color:"#2a8a7a", x:20,  y:510, w:820, h:130, type:"text",  content:"Synthèse et conclusion du sous-thème..." },
  { id:"lnk", title:"Liens entre thèmes", color:"#6b7890", x:860, y:510, w:240, h:130, type:"text",  content:"↔ Thème 2\n↔ Thème 3" },
];

const CanvasCard = ({ card, sid, onDragStart, onResizeStart, onUpdate, onDelete, isDragging, isResizing }) => {
  const titleRef   = useRef(null);
  const contentRef = useRef(null);
  const imgKey     = `${sid}_cv_img_${card.id}`;
  const [imgSrc, setImgSrc] = useState(() => { try { return localStorage.getItem(imgKey) || null; } catch { return null; } });
  const [lightbox, setLightbox] = useState(false);

  useEffect(() => {
    if (titleRef.current)   titleRef.current.textContent   = card.title;
    if (contentRef.current) contentRef.current.textContent = card.content || "";
  }, []);

  useEffect(() => {
    if (imgSrc && !card.imgRatio) {
      const probe = new Image();
      probe.onload = () => { const ratio = probe.naturalWidth / probe.naturalHeight; if (ratio > 0) onUpdate({ imgRatio:ratio, h:Math.max(80, Math.round(card.w/ratio)) }); };
      probe.src = imgSrc;
    }
  }, [imgSrc]);

  const loadImg = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const r = new FileReader();
    r.onload = e => {
      const probe = new Image();
      probe.onload = () => {
        const compress = (maxDim, quality) => {
          const scale = Math.min(1, maxDim / Math.max(probe.naturalWidth, probe.naturalHeight));
          const cw = Math.round(probe.naturalWidth * scale), ch = Math.round(probe.naturalHeight * scale);
          const canvas = document.createElement("canvas"); canvas.width = cw; canvas.height = ch;
          const ctx = canvas.getContext("2d"); ctx.fillStyle = "#fff"; ctx.fillRect(0,0,cw,ch); ctx.drawImage(probe,0,0,cw,ch);
          return { data:canvas.toDataURL("image/jpeg",quality), cw, ch };
        };
        for (const [max, q] of [[1400,.85],[1100,.80],[850,.75],[650,.70],[500,.65]]) {
          const { data, cw, ch } = compress(max, q);
          try { localStorage.setItem(imgKey, data); setImgSrc(data); onUpdate({ imgRatio:cw/ch, h:Math.max(80,Math.round(card.w/(cw/ch))+26) }); return; }
          catch {}
        }
        alert("Espace de stockage saturé. Supprime quelques images puis réessaie.");
      };
      probe.src = e.target.result;
    };
    r.readAsDataURL(file);
  };

  const active = isDragging || isResizing;
  return (
    <div style={{ position:"absolute", top:card.y, left:card.x, width:card.w, height:card.h,
      border:`2px solid ${card.color}`, borderRadius:6, background:"#fff", overflow:"hidden",
      boxShadow: active ? "6px 8px 22px rgba(0,0,0,.2)" : "2px 3px 8px rgba(0,0,0,.07)",
      zIndex: active ? 100 : 1, transition: active ? "none" : "box-shadow .15s" }}>
      <div onPointerDown={onDragStart} style={{ background:card.color, padding:"4px 8px 4px 10px",
        display:"flex", alignItems:"center", gap:6, cursor:isDragging?"grabbing":"grab", userSelect:"none", flexShrink:0, touchAction:"none" }}>
        <span style={{ color:"rgba(255,255,255,.5)", fontSize:11 }}>⠿</span>
        <span ref={titleRef} contentEditable suppressContentEditableWarning
          onBlur={e => onUpdate({ title:e.currentTarget.textContent })} onPointerDown={e => e.stopPropagation()}
          style={{ flex:1, fontSize:12, fontWeight:700, color:"#fff", outline:"none", cursor:"text" }} />
        <button onClick={onDelete} onPointerDown={e => e.stopPropagation()}
          style={{ background:"none", border:"none", color:"rgba(255,255,255,.6)", cursor:"pointer", fontSize:16, padding:"0 3px", lineHeight:1, flexShrink:0 }}>×</button>
      </div>
      <div style={{ padding:card.type==="image"?0:"8px 10px", height:"calc(100% - 26px)", overflow:"hidden" }}>
        {card.type === "image"
          ? <>
              <div onClick={() => { const i=document.createElement("input"); i.type="file"; i.accept="image/*"; i.onchange=e=>loadImg(e.target.files[0]); i.click(); }}
                onDrop={e => { e.preventDefault(); loadImg(e.dataTransfer.files[0]); }} onDragOver={e => e.preventDefault()}
                onPointerDown={e => e.stopPropagation()}
                style={{ width:"100%", height:"100%", cursor:"pointer", overflow:"hidden", position:"relative",
                  border:imgSrc?"none":"2px dashed #c4c9d4",
                  background:imgSrc?"#fff":"repeating-linear-gradient(45deg,#eee,#eee 2px,#f5f5f3 2px,#f5f5f3 10px)",
                  display:"flex", alignItems:"center", justifyContent:"center" }}>
                {imgSrc ? <img src={imgSrc} alt="" style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />
                        : <div style={{ color:"#aaa", textAlign:"center", fontSize:12, userSelect:"none" }}>📷<br/>Cliquer ou glisser</div>}
                {imgSrc && <>
                  <button onClick={e => { e.stopPropagation(); setLightbox(true); }} onPointerDown={e => e.stopPropagation()}
                    style={{ position:"absolute", top:4, left:4, background:"rgba(0,0,0,.55)", color:"#fff",
                      border:"none", width:24, height:24, borderRadius:3, fontSize:12, cursor:"pointer", lineHeight:1 }}>⤢</button>
                  <div style={{ position:"absolute", top:4, right:4, background:"rgba(0,0,0,.5)", color:"#fff", fontSize:10, padding:"2px 6px", borderRadius:2, pointerEvents:"none" }}>✎</div>
                </>}
              </div>
              {lightbox && imgSrc && <Lightbox src={imgSrc} type="image" onClose={() => setLightbox(false)} />}
            </>
          : <div ref={contentRef} contentEditable suppressContentEditableWarning
              onBlur={e => onUpdate({ content:e.currentTarget.textContent })} onPointerDown={e => e.stopPropagation()}
              data-ph="Cliquez pour éditer..."
              style={{ outline:"none", fontSize:13, lineHeight:1.6, color:"#3a4558", height:"100%", cursor:"text", whiteSpace:"pre-wrap", overflowY:"auto" }} />
        }
      </div>
      <div onPointerDown={e => { e.stopPropagation(); onResizeStart(e); }}
        style={{ position:"absolute", bottom:0, right:0, width:22, height:22, cursor:"se-resize",
          display:"flex", alignItems:"flex-end", justifyContent:"flex-end", padding:"4px", touchAction:"none", zIndex:2 }}>

// ── Modal Gemini ─────────────────────────────────────────────────
const GeminiModal = ({ sid, onClose, onApply }) => {
  const [step,   setStep]   = useState("idle");
  const [errMsg, setErrMsg] = useState("");

  useEffect(() => {
    const fn = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", fn);
    document.body.style.overflow = "hidden";
    return () => { document.removeEventListener("keydown", fn); document.body.style.overflow = ""; };
  }, []);

  const run = async () => {
    const key = GEMINI_API_KEY;
    setErrMsg("");

    try {
      // Étape 1 : extraire le texte du PDF
      setStep("extracting");
      const pdfData = localStorage.getItem(`${sid}_pdf`);
      if (!pdfData) throw new Error("Aucun PDF trouvé dans ce dossier.\nCharge ton cours PDF dans l'onglet Dossier puis réessaie.");

      await loadPDFJS();
      const pdfDoc = await window.pdfjsLib.getDocument(pdfData).promise;
      let pdfText = "";
      for (let p = 1; p <= pdfDoc.numPages; p++) {
        const page = await pdfDoc.getPage(p);
        const tc   = await page.getTextContent();
        pdfText   += tc.items.map(it => it.str).join(" ") + "\n";
      }
      pdfText = pdfText.trim().slice(0, 60000);
      if (!pdfText) throw new Error("Le PDF est un scan image — le texte ne peut pas être extrait.\nUtilise un PDF avec du texte sélectionnable.");

      // Étape 2 : appeler Gemini
      setStep("calling");
      const prompt = GEMINI_MM_PROMPT + "\n\n---\nCONTENU DU COURS :\n" + pdfText;

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.65, maxOutputTokens: 4096 },
          }),
        }
      );

      const json = await res.json();
      if (!res.ok) throw new Error(json.error?.message || `Erreur HTTP ${res.status}`);

      let raw = json.candidates?.[0]?.content?.parts?.[0]?.text || "";
      // Enlever les balises markdown si Gemini les ajoute quand même
      raw = raw.replace(/^```(?:json)?\n?/m, "").replace(/\n?```$/m, "").trim();

      const data = JSON.parse(raw);
      onApply(buildAICards(data));
      onClose();

    } catch (e) {
      setErrMsg(e.message || "Erreur inconnue");
      setStep("error");
    }
  };

  const busy = step === "extracting" || step === "calling";

  return ReactDOM.createPortal(
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(10,18,30,.6)",
      backdropFilter:"blur(3px)", zIndex:9000, display:"flex", alignItems:"center",
      justifyContent:"center", fontFamily:"'Plus Jakarta Sans',sans-serif", padding:20 }}>
      <div onClick={e => e.stopPropagation()} className="anim-fadein"
        style={{ background:"#fff", borderRadius:18, width:"100%", maxWidth:460,
          padding:"30px 32px", boxShadow:"0 24px 64px rgba(0,0,0,.25)" }}>

        {/* En-tête */}
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:24 }}>
          <div style={{ width:46, height:46, borderRadius:13,
            background:"linear-gradient(135deg,#2454A0 0%,#6366f1 100%)",
            display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:24, flexShrink:0, boxShadow:"0 4px 14px rgba(99,102,241,.35)" }}>✨</div>
          <div>
            <div style={{ fontSize:17, fontWeight:800, color:"#1a2332" }}>Générer avec Gemini</div>
            <div style={{ fontSize:12, color:"#8898b0", marginTop:2 }}>Carte mentale DNL depuis le PDF du dossier</div>
          </div>
          <div style={{ flex:1 }} />
          <button onClick={onClose} style={{ width:30, height:30, borderRadius:"50%", background:"#f0f2f5",
            border:"none", cursor:"pointer", fontSize:17, color:"#5a6880", lineHeight:1 }}>×</button>
        </div>

        {/* Progression */}
        {busy && (
          <div style={{ background:"#f0f4ff", borderRadius:10, padding:"13px 16px", marginBottom:16,
            display:"flex", alignItems:"center", gap:10, border:"1px solid #dde8ff" }}>
            <div style={{ fontSize:16, color:"#6366f1" }}>⟳</div>
            <div style={{ fontSize:13, color:"#2454A0", fontWeight:600 }}>
              {step === "extracting" ? "Extraction du texte PDF…" : "Gemini génère ta carte mentale…"}
            </div>
          </div>
        )}

        {/* Erreur */}
        {step === "error" && (
          <div style={{ background:"#fef2f2", border:"1px solid #fecaca", borderRadius:10,
            padding:"13px 16px", marginBottom:16, whiteSpace:"pre-line" }}>

        {/* Boutons */}
        <div style={{ display:"flex", gap:10 }}>
          <button onClick={onClose} style={{ flex:1, padding:"11px", background:"#f5f6f9",
            color:"#5a6880", border:"1px solid #d8dde8", borderRadius:9, cursor:"pointer",

const MindmapCanvas = ({ sid }) => {
  const lsKey = `${sid}_canvas_state`;
  const counter = useRef(100);
  const [cards, setCards] = useState(() => {
    try { const s = localStorage.getItem(lsKey); return s ? JSON.parse(s) : CANVAS_DEFAULTS.map(c => ({...c})); }
    catch { return CANVAS_DEFAULTS.map(c => ({...c})); }
  });
  const [dragging, setDragging] = useState(null);
  const [resizing, setResizing] = useState(null);
  const [zoom, setZoom] = useState(1);
  const zoomRef = useRef(1);
  useEffect(() => { zoomRef.current = zoom; }, [zoom]);
  const containerRef = useRef(null);

  useEffect(() => {
    const el = containerRef.current; if (!el) return;
    const onWheel = (e) => { if (e.ctrlKey||e.metaKey) { e.preventDefault(); setZoom(z => Math.max(0.3, Math.min(2, z*(e.deltaY<0?1.08:0.93)))); } };
    el.addEventListener("wheel", onWheel, { passive:false });
    return () => el.removeEventListener("wheel", onWheel);
  }, []);

  const [showGemini, setShowGemini] = useState(false);

  const persist = (list) => { try { localStorage.setItem(lsKey, JSON.stringify(list)); } catch {} };
  const updateCard = (id, updates) => setCards(prev => { const next = prev.map(c => c.id===id?{...c,...updates}:c); persist(next); return next; });
  const deleteCard = (id) => setCards(prev => { const next = prev.filter(c => c.id!==id); persist(next); return next; });
  const applyAICards = (newCards) => { persist(newCards); setCards(newCards); };
  const addCard = (type) => {
    const id = `card_${counter.current++}`;
    const card = { id, type, title:type==="image"?"Image / Carte":"Nouveau bloc",
      color:CARD_COLORS[Math.floor(Math.random()*CARD_COLORS.length)],
      x:40+Math.random()*280, y:40+Math.random()*80, w:type==="image"?300:340, h:type==="image"?260:220, content:"" };
    setCards(prev => { const next=[...prev,card]; persist(next); return next; });
  };
  const startDrag = (e, cardId) => {
    if (!containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const card = cards.find(c => c.id===cardId);
    setDragging({ cardId, ox:(e.clientX-rect.left+containerRef.current.scrollLeft)/zoomRef.current-card.x, oy:(e.clientY-rect.top+containerRef.current.scrollTop)/zoomRef.current-card.y });
    e.preventDefault();
  };
  const startResize = (e, cardId) => {
    const card = cards.find(c => c.id===cardId);
    setResizing({ cardId, startX:e.clientX, startY:e.clientY, startW:card.w, startH:card.h });
    e.preventDefault();
  };
  useEffect(() => {
    const onMove = (e) => {
      const z = zoomRef.current;
      if (dragging && containerRef.current) {
        const rect = containerRef.current.getBoundingClientRect();
        const x = Math.max(0, (e.clientX-rect.left+containerRef.current.scrollLeft)/z-dragging.ox);
        const y = Math.max(0, (e.clientY-rect.top+containerRef.current.scrollTop)/z-dragging.oy);
        setCards(prev => prev.map(c => c.id===dragging.cardId?{...c,x,y}:c));
      }
      if (resizing) {
        const w = Math.max(120, resizing.startW+(e.clientX-resizing.startX)/z);
        let h = Math.max(60, resizing.startH+(e.clientY-resizing.startY)/z);
        const card = cards.find(c => c.id===resizing.cardId);
        if (card && card.imgRatio) h = Math.max(80, Math.round((w/card.imgRatio)+26));
        setCards(prev => prev.map(c => c.id===resizing.cardId?{...c,w,h}:c));
      }
    };
    const onUp = () => {
      if (dragging) { setDragging(null); setCards(prev => { persist(prev); return prev; }); }
      if (resizing) { setResizing(null); setCards(prev => { persist(prev); return prev; }); }
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    return () => { document.removeEventListener("pointermove", onMove); document.removeEventListener("pointerup", onUp); };
  }, [dragging, resizing]);

  return (
    <div style={{ display:"flex", flexDirection:"column", flex:1, minHeight:0 }}>
      <div style={{ height:46, flexShrink:0, background:"#fff", borderBottom:"1px solid #e2e6ed",
        display:"flex", alignItems:"center", padding:"0 20px", gap:10 }}>
        <span style={{ fontSize:13, color:"#8898b0" }}>Glisser · zoom (Ctrl+molette)</span>
        <div style={{ flex:1 }} />
        <div style={{ display:"flex", alignItems:"center", gap:4, marginRight:4 }}>
          <button onClick={() => setZoom(z => Math.max(0.3,z*0.9))}
            style={{ width:28, height:28, background:"#f5f6f9", color:"#5a6880", border:"1px solid #d8dde8", borderRadius:5, cursor:"pointer", fontSize:14 }}>−</button>
          <button onClick={() => setZoom(1)}
            style={{ padding:"0 8px", height:28, background:"#f5f6f9", color:"#5a6880", border:"1px solid #d8dde8", borderRadius:5, cursor:"pointer", fontSize:11, minWidth:48 }}>
            {Math.round(zoom*100)}%</button>
          <button onClick={() => setZoom(z => Math.min(2,z*1.1))}
            style={{ width:28, height:28, background:"#f5f6f9", color:"#5a6880", border:"1px solid #d8dde8", borderRadius:5, cursor:"pointer", fontSize:14 }}>+</button>
        </div>
        <button onClick={() => addCard("image")} style={{ padding:"5px 14px", background:"#f5f6f9", color:"#5a6880", border:"1px solid #d8dde8", borderRadius:5, cursor:"pointer", fontSize:13 }}>+ Image</button>
        <button onClick={() => addCard("text")} style={{ padding:"5px 14px", background:"#f5f6f9", color:"#5a6880", border:"1px solid #d8dde8", borderRadius:5, cursor:"pointer", fontSize:13 }}>+ Texte</button>
        <button onClick={() => setShowGemini(true)}
          style={{ padding:"5px 16px", background:"linear-gradient(135deg,#2454A0,#6366f1)",
            color:"#fff", border:"none", borderRadius:5, cursor:"pointer", fontSize:13, fontWeight:600,
            boxShadow:"0 2px 8px rgba(99,102,241,.35)" }}>✨ Générer avec l'IA</button>
      </div>
      <div ref={containerRef} style={{ flex:1, minHeight:0, overflow:"auto", position:"relative", background:"#f5f6f9",
        backgroundImage:"radial-gradient(circle, #c4c9d4 1px, transparent 1px)",
        backgroundSize:`${22*zoom}px ${22*zoom}px`,
        cursor: dragging?"grabbing":resizing?"se-resize":"default" }}>
        <div style={{ width:3000*zoom, height:2000*zoom, position:"relative" }}>
          <div style={{ width:3000, height:2000, position:"relative", transform:`scale(${zoom})`, transformOrigin:"0 0" }}>
            {cards.map(card => (
              <CanvasCard key={card.id} card={card} sid={sid}
                onDragStart={e => startDrag(e, card.id)}
                onResizeStart={e => startResize(e, card.id)}
                onUpdate={u => updateCard(card.id, u)}
                onDelete={() => deleteCard(card.id)}
                isDragging={dragging?.cardId===card.id}
                isResizing={resizing?.cardId===card.id} />
            ))}
          </div>
        </div>
      </div>
      {showGemini && (
        <GeminiModal sid={sid} onClose={() => setShowGemini(false)} onApply={applyAICards} />
      )}
    </div>
  );
};

              background:"#eef4ff", borderRadius:12, border:"2px solid #2d60a7", boxShadow:"0 4px 20px rgba(45,96,167,.13)",
              display:"flex", flexDirection:"column", padding:"28px 32px" }}>
              <div style={{ fontSize:11, fontWeight:600, color:"#2d60a7", textTransform:"uppercase", letterSpacing:".08em", marginBottom:14 }}>Réponse</div>
              <CardField storageKey={`${sid}_q_${cur.id}_a`} defaultVal={cur.answer} ph="Rédigez la réponse..."
                style={{ flex:1, fontSize:16, color:"#2a3a50", lineHeight:1.7 }} />
            </div>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <button onClick={()=>go(-1)} disabled={idx===0}
            style={{ width:40, height:40, borderRadius:"50%", border:"1px solid #d8dde8", background:idx>0?"#fff":"transparent", cursor:idx>0?"pointer":"default", color:idx>0?"#1a2332":"#d0d5de", fontSize:18 }}>←</button>
          <button onClick={toggleKnown} style={{ padding:"8px 20px", borderRadius:8, cursor:"pointer", fontSize:14, fontWeight:600, border:"1px solid",
            background:cur.known?"#e8f5e9":"#fff3e0", color:cur.known?"#2e7d32":"#e65100", borderColor:cur.known?"#a5d6a7":"#ffcc80" }}>
            {cur.known ? "✓ Connu" : "✗ À revoir"}</button>
          <button onClick={()=>setFlipped(f=>!f)}
            style={{ padding:"8px 22px", borderRadius:8, background:"#2d60a7", color:"#fff", border:"none", cursor:"pointer", fontSize:14, fontWeight:600 }}>Retourner</button>
          <button onClick={()=>go(1)} disabled={idx===cards.length-1}
            style={{ width:40, height:40, borderRadius:"50%", border:"1px solid #d8dde8", background:idx<cards.length-1?"#fff":"transparent", cursor:idx<cards.length-1?"pointer":"default", color:idx<cards.length-1?"#1a2332":"#d0d5de", fontSize:18 }}>→</button>
          <button onClick={delCard} disabled={cards.length<=1}
            style={{ width:36, height:36, borderRadius:"50%", border:"1px solid #fecaca", background:cards.length>1?"#fff5f5":"transparent", cursor:cards.length>1?"pointer":"default", color:cards.length>1?"#dc2626":"#d0d5de", fontSize:16 }}>×</button>
        </div>
      </div>
    </div>
  );
};

const ThemeLabel = ({ themeId, defaultTitle, open }) => {
  const ref = useRef(null);
  const lsKey = `theme_${themeId}_titre`;
  useEffect(() => {
    if (!ref.current) return;
    ref.current.textContent = localStorage.getItem(lsKey) || defaultTitle;
  }, [themeId]);
  return (
    <span ref={ref} contentEditable suppressContentEditableWarning
      onClick={e => e.stopPropagation()} onMouseDown={e => e.stopPropagation()}
      onBlur={e => localStorage.setItem(lsKey, e.currentTarget.textContent)}
      data-ph="Nom du thème"
      style={{ flex:1, outline:"none", cursor:"text", color:open?"#fff":"#8898b0", fontSize:13.5, fontWeight:600 }} />
  );
};

const Sidebar = ({ themes, activePath, onSelect, stTitles, onAddTheme, onDeleteTheme, onAddST, onDeleteST, subjectNom, subjectSoustitre }) => {
  const [expanded, setExpanded] = useState(() => new Set(themes.length>0?[themes[0].id]:[]));
  useEffect(() => {
    if (activePath[0]) setExpanded(prev => { const n=new Set(prev); n.add(activePath[0]); return n; });
  }, [activePath[0]]);
  const toggle = (id) => setExpanded(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  const totalST = themes.reduce((acc,t) => acc+t.sousThemes.length, 0);
  return (
    <aside data-np style={{ width:240, flexShrink:0, background:"#1d2b42", color:"#e8ecf2", display:"flex", flexDirection:"column", overflowY:"auto" }}>
      <div style={{ padding:"18px 20px 14px", borderBottom:"1px solid #28395a" }}>
        <div style={{ fontSize:15, fontWeight:700, color:"#fff" }}>{subjectNom || "Matière"}</div>
        <div style={{ fontSize:12, color:"#6a7f98", marginTop:2 }}>{subjectSoustitre || ""}</div>
      </div>

      <div style={{ flex:1, padding:"8px 0", overflowY:"auto" }}>
        {themes.map((theme) => {
          const open = expanded.has(theme.id);
          return (
            <div key={theme.id}>
              <div style={{ display:"flex", alignItems:"center", padding:"8px 12px 8px 16px", gap:6 }}>
                <button onClick={() => toggle(theme.id)} style={{ background:"none", border:"none", cursor:"pointer",
                  color:open?"#fff":"#6a7f98", padding:0, fontSize:9, flexShrink:0 }}>{open?"▼":"▶"}</button>
                <ThemeLabel themeId={theme.id} defaultTitle={theme.titre} open={open} />
                <button onClick={() => onAddST(theme.id)} title="Ajouter un sous-thème"
                  style={{ background:"none", border:"none", cursor:"pointer", color:"#4a6080",
                    fontSize:16, padding:"0 3px", flexShrink:0, lineHeight:1,
                    transition:"color .15s" }}
                  onMouseEnter={e => e.currentTarget.style.color="#74aadf"}
                  onMouseLeave={e => e.currentTarget.style.color="#4a6080"}>+</button>
                <button onClick={() => onDeleteTheme(theme.id)} title="Supprimer ce thème"
                  style={{ background:"none", border:"none", cursor:"pointer", color:"#3a4e68",
                    fontSize:15, padding:"0 3px", flexShrink:0, lineHeight:1,
                    transition:"color .15s" }}
                  onMouseEnter={e => e.currentTarget.style.color="#f87171"}
                  onMouseLeave={e => e.currentTarget.style.color="#3a4e68"}>×</button>
              </div>
              {open && theme.sousThemes.map((st) => {
                const active = activePath[0]===theme.id && activePath[1]===st.id;
                const label = stTitles?.[st.id] || st.titre;
                return (
                  <div key={st.id} style={{ display:"flex", alignItems:"stretch" }}>
                    <button onClick={() => onSelect(theme.id, st.id)} style={{ flex:1, textAlign:"left",
                      padding:"6px 8px 6px 32px", background:active?"#2d60a7":"none", border:"none", cursor:"pointer",
                      borderLeft:active?"3px solid #74aadf":"3px solid transparent",
                      color:active?"#fff":"#7a8da4", fontSize:13, lineHeight:1.4 }}>
                      <span style={{ marginRight:6, opacity:.4 }}>•</span>{label}
                    </button>
                    <button onClick={() => onDeleteST(theme.id, st.id)} title="Supprimer"
                      style={{ background:"none", border:"none", cursor:"pointer", color:"#3a4e68",
                        fontSize:14, padding:"0 10px 0 4px", flexShrink:0,
                        transition:"color .15s" }}
                      onMouseEnter={e => e.currentTarget.style.color="#f87171"}
                      onMouseLeave={e => e.currentTarget.style.color="#3a4e68"}>×</button>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      <div style={{ padding:"12px 16px", borderTop:"1px solid #28395a", flexShrink:0 }}>
        <button onClick={onAddTheme}
          style={{ width:"100%", padding:"8px 12px", background:"rgba(255,255,255,.06)", border:"1px dashed #3a4e68",
            borderRadius:6, color:"#6a7f98", cursor:"pointer", fontSize:13, fontFamily:"inherit", textAlign:"left",
            transition:"all .15s" }}
          onMouseEnter={e => { e.currentTarget.style.background="rgba(116,170,223,.1)"; e.currentTarget.style.color="#74aadf"; e.currentTarget.style.borderColor="#74aadf"; }}
          onMouseLeave={e => { e.currentTarget.style.background="rgba(255,255,255,.06)"; e.currentTarget.style.color="#6a7f98"; e.currentTarget.style.borderColor="#3a4e68"; }}>
          + Ajouter un thème
        </button>
        <div style={{ marginTop:8, fontSize:11, color:"#4a5e78" }}>
          {themes.length} thème{themes.length!==1?"s":""} · {totalST} sous-thème{totalST!==1?"s":""}
        </div>
      </div>
    </aside>
  );
};

          <div style={{ fontSize:22, fontWeight:800, color:"#1a2332", marginBottom:4 }}>Mes matières</div>
          <div style={{ fontSize:14, color:"#8898b0" }}>Sélectionne une matière pour commencer à réviser.</div>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(210px, 1fr))", gap:16 }}>
          {subjects.map(subj => (
            <SubjectCard key={subj.id} subject={subj} themes={subjectThemes[subj.id]||[]}

          ))}

          {/* Carte "Ajouter" */}
          <div onClick={onAddSubject}
            onMouseEnter={() => setAddHover(true)} onMouseLeave={() => setAddHover(false)}

              background:addHover?"#f0f4ff":"#fafbfc", cursor:"pointer", minHeight:170,
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:10,
              color:addHover?"#2454A0":"#9aa3b0", transition:"all .2s",
              transform:addHover?"translateY(-2px)":"translateY(0)" }}>
            <div style={{ width:40, height:40, borderRadius:"50%", background:addHover?"#2454A0":"#e8ecf2",
              display:"flex", alignItems:"center", justifyContent:"center", color:addHover?"#fff":"#9aa3b0",
              fontSize:22, transition:"all .2s", fontWeight:300 }}>+</div>
            <div style={{ fontSize:13.5, fontWeight:600 }}>Ajouter une matière</div>
          </div>
        </div>
      </div>
    </div>
  );
};

            boxShadow:"0 4px 14px rgba(36,84,160,.3)" }}>
            {initial}
          </div>
          <div>
            <div style={{ fontWeight:800, fontSize:18, color:"#1a2332" }}>Mon compte</div>

            transition:"background .15s" }}

        </div>

        {/* Infos */}
        <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:28 }}>
          {[

            <div key={label} style={{ background:"#f7f9fc", borderRadius:10, padding:"14px 16px",

              <div style={{ fontSize:10.5, fontWeight:700, color:"#9aa3b0", textTransform:"uppercase",

              <div style={{ fontSize:14, color:"#1a2332", fontWeight:500 }}>{value}</div>

        {/* Changer de mot de passe */}
        <div style={{ borderTop:"1px solid #edf0f6", paddingTop:22, marginBottom:22 }}>

                borderRadius:9, fontSize:13, outline:"none", fontFamily:"inherit", boxSizing:"border-box",
                transition:"border-color .2s" }} />
            <button type="button" onClick={() => setShowNew(s=>!s)}

          {pwdErr && <div style={{ marginTop:8, fontSize:12, color:"#dc2626" }}>{pwdErr}</div>}
          {pwdMsg && <div style={{ marginTop:8, fontSize:12, color:"#16a34a" }}>{pwdMsg}</div>}
          <button onClick={changePwd} disabled={!newPwd||pwdLoading}
