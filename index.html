  <script>
    (function () {
      const proto = Object.getPrototypeOf(window.localStorage);
      const nativeSet = proto.setItem;
      const nativeGet = proto.getItem;
      const nativeRemove = proto.removeItem;
      window.__cache = new Map();
      window.__origSet = function (k, v) {
        try { nativeSet.call(window.localStorage, k, v); window.__cache.delete(k); }
        catch (err) { window.__cache.set(k, v); }
      };
      window.__syncQueue = [];
      proto.setItem = function (k, v) {
        try { nativeSet.call(this, k, v); window.__cache.delete(k); }
        catch (err) { window.__cache.set(k, v); }
        if (typeof k !== "string") return;
        if (k.startsWith("sb-") || k.startsWith("supabase.")) return;
        if (window.__syncPush) window.__syncPush(k, v);
        else window.__syncQueue.push([k, v]);
      };
      proto.getItem = function (k) {
        const v = nativeGet.call(this, k);
        if (v !== null) return v;
        return window.__cache.has(k) ? window.__cache.get(k) : null;
      };
      proto.removeItem = function (k) {
        nativeRemove.call(this, k);
        window.__cache.delete(k);
      };
    })();
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ════════════════════════════════════════════════════════════════
//  SUPABASE
// ════════════════════════════════════════════════════════════════
const SUPABASE_URL = "https://bfxtjqevxdrewokaemzx.supabase.co";
const SUPABASE_KEY = "sb_publishable_F-8ef9orhZMCnTOGTfDlEg_KQc9pRyL";
const _sb  = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let   _uid = null;

const _clearLocalData = () => {
  const toDelete = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && !k.startsWith("sb-") && !k.startsWith("supabase.")) toDelete.push(k);
  }
  toDelete.forEach(k => localStorage.removeItem(k));
  if (window.__cache) window.__cache.clear();
};
const _origSet = window.__origSet || ((k, v) => localStorage.setItem(k, v));

// ════════════════════════════════════════════════════════════════
//  SYNC STRUCTURÉE — tables subjects / themes / sous_themes /
//  quiz_cards / canvas_cards. Les champs libres du Dossier, les PDF
//  et les images restent dans content / images.
// ════════════════════════════════════════════════════════════════
const _warn = (tag) => ({ error }) => { if (error) console.warn("sync " + tag + ":", error.message); };
const _notIn = (q, ids) => ids.length ? q.not("id", "in", "(" + ids.map(i => '"' + i + '"').join(",") + ")") : q;

const _pushSubjects = (v) => {
  let list; try { list = JSON.parse(v); } catch { return; }
  if (!Array.isArray(list)) return;
  const rows = list.map(s => ({ user_id:_uid, id:s.id, nom:s.nom||"", soustitre:s.soustitre||"", couleur:s.couleur||"#007AFF", emoji:s.emoji||"📚" }));
  const run = async () => {
    if (rows.length) await _sb.from("subjects").upsert(rows).then(_warn("subjects"));
    await _notIn(_sb.from("subjects").delete().eq("user_id", _uid), list.map(s => s.id)).then(_warn("subjects del"));
  };
  run().catch(e => console.warn("sync:", e));
};

const _pushThemes = (sid, v) => {
  let themes; try { themes = JSON.parse(v); } catch { return; }
  if (!Array.isArray(themes)) return;
  const tRows = [], stRows = [], tIds = [], stIds = [];
  themes.forEach((t, ti) => {
    const titre = localStorage.getItem(`theme_${t.id}_titre`) || t.titre || "";
    tRows.push({ user_id:_uid, id:t.id, subject_id:sid, titre, ord:ti });
    tIds.push(t.id);
    (t.sousThemes||[]).forEach((st, si) => {
      const stTitre = localStorage.getItem(`${st.id}_titre`) || st.titre || "";
      stRows.push({ user_id:_uid, id:st.id, theme_id:t.id, titre:stTitre, ord:si, dissertation_sujet:"", dissertation_texte:"" });
      stIds.push(st.id);
    });
  });
  const run = async () => {
    if (tRows.length)  await _sb.from("themes").upsert(tRows).then(_warn("themes"));
    if (stRows.length) await _sb.from("sous_themes").upsert(stRows).then(_warn("sous_themes"));
    await _notIn(_sb.from("themes").delete().eq("user_id", _uid).eq("subject_id", sid), tIds).then(_warn("themes del"));
    if (tIds.length)
      await _notIn(_sb.from("sous_themes").delete().eq("user_id", _uid).in("theme_id", tIds), stIds).then(_warn("st del"));
  };
  run().catch(e => console.warn("sync:", e));
};

const _pushQuiz = (stid, v) => {
  let list; try { list = JSON.parse(v); } catch { return; }
  if (!Array.isArray(list)) return;
  const rows = list.map((c, i) => ({
    user_id:_uid, id:`${stid}__${c.id}`, sous_theme_id:stid,
    question: localStorage.getItem(`${stid}_q_${c.id}_q`) ?? c.question ?? "",
    answer:   localStorage.getItem(`${stid}_q_${c.id}_a`) ?? c.answer ?? "",
    is_known: !!c.known, ord:i
  }));
  const run = async () => {
    if (rows.length) await _sb.from("quiz_cards").upsert(rows).then(_warn("quiz"));
    await _notIn(_sb.from("quiz_cards").delete().eq("user_id", _uid).eq("sous_theme_id", stid), rows.map(r => r.id)).then(_warn("quiz del"));
  };
  run().catch(e => console.warn("sync:", e));
};

const _pushCanvas = (stid, v) => {
  let list; try { list = JSON.parse(v); } catch { return; }
  if (!Array.isArray(list)) return;
  const rows = list.map((c, i) => ({
    user_id:_uid, id:`${stid}__${c.id}`, sous_theme_id:stid,
    title:c.title||"", color:c.color||"#3b6ea5",
    x:c.x||0, y:c.y||0, w:c.w||300, h:c.h||200,
    type:c.type||"text", content:c.content||"", img_ratio:c.imgRatio||0, ord:i
  }));
  const run = async () => {
    if (rows.length) await _sb.from("canvas_cards").upsert(rows).then(_warn("canvas"));
    await _notIn(_sb.from("canvas_cards").delete().eq("user_id", _uid).eq("sous_theme_id", stid), rows.map(r => r.id)).then(_warn("canvas del"));
  };
  run().catch(e => console.warn("sync:", e));
};

// Débounce par clé pour éviter de marteler le serveur
const _debounces = new Map();
const _debounced = (k, fn, ms = 700) => {
  clearTimeout(_debounces.get(k));
  _debounces.set(k, setTimeout(fn, ms));
};

window.__syncPush = (k, v) => {
  if (!_uid) return;

  // ── Clés structurées ──────────────────────────────────────────
  if (k === "app_subjects") return _debounced(k, () => _pushSubjects(v));

  let m;
  if ((m = k.match(/^subj_(.+)_themes$/)))
    return _debounced(k, () => _pushThemes(m[1], localStorage.getItem(k) ?? v));
  if ((m = k.match(/^theme_(.+)_titre$/)))
    return _debounced(k, () => _sb.from("themes").update({ titre:v }).eq("user_id",_uid).eq("id",m[1]).then(_warn("theme titre")));
  if ((m = k.match(/^(.+)_canvas_state$/)))
    return _debounced(k, () => _pushCanvas(m[1], localStorage.getItem(k) ?? v));
  if ((m = k.match(/^(.+)_q_(.+)_q$/)))
    return _debounced(k, () => _sb.from("quiz_cards").update({ question:v }).eq("user_id",_uid).eq("id",`${m[1]}__${m[2]}`).then(_warn("quiz q")));
  if ((m = k.match(/^(.+)_q_(.+)_a$/)))
    return _debounced(k, () => _sb.from("quiz_cards").update({ answer:v }).eq("user_id",_uid).eq("id",`${m[1]}__${m[2]}`).then(_warn("quiz a")));
  if ((m = k.match(/^(.+)_quiz$/)))
    return _debounced(k, () => _pushQuiz(m[1], localStorage.getItem(k) ?? v));
  if ((m = k.match(/^(.+)_titre$/)) && !k.startsWith("theme_"))
    return _debounced(k, () => _sb.from("sous_themes").update({ titre:v }).eq("user_id",_uid).eq("id",m[1]).then(_warn("st titre")));

  // ── Clés libres (Dossier, PDF, annotations, images) ──────────
  const isImg = k.startsWith("img_");
  const row = isImg ? { user_id:_uid, key:k.slice(4), data:v } : { user_id:_uid, key:k, value:v };
  _debounced(k, () => _sb.from(isImg ? "images" : "content").upsert(row, { onConflict: "user_id,key" })
     .then(_warn(k))
     .catch(e => console.warn("sync:", e)));
};

const _flushSyncQueue = () => {
  const q = window.__syncQueue || []; window.__syncQueue = [];
  q.forEach(([k, v]) => window.__syncPush(k, v));
};

const loadUserData = async (uid) => {
  _clearLocalData();
  const [subjects, themes, sousThemes, quiz, canvas, content, images] = await Promise.all([
    _sb.from("subjects").select("*").eq("user_id", uid).order("created_at"),
    _sb.from("themes").select("*").eq("user_id", uid).order("ord"),
    _sb.from("sous_themes").select("*").eq("user_id", uid).order("ord"),
    _sb.from("quiz_cards").select("*").eq("user_id", uid).order("ord"),
    _sb.from("canvas_cards").select("*").eq("user_id", uid).order("ord"),
    _sb.from("content").select("key,value").eq("user_id", uid),
    _sb.from("images").select("key,data").eq("user_id", uid),
  ]);
  [subjects, themes, sousThemes, quiz, canvas, content, images].forEach(r => { if (r.error) console.warn("pull:", r.error.message); });

  // 1) Champs libres d'abord (l'ancien format sert de base / migration)
  (content.data||[]).forEach(r => { try { _origSet(r.key, r.value); } catch {} });
  (images.data||[]).forEach(r => { try { _origSet("img_"+r.key, r.data); } catch {} });

  // Mémoriser les matières "legacy" (ancien format) avant écrasement
  let legacySubjects = [];
  try { legacySubjects = JSON.parse(localStorage.getItem("app_subjects") || "[]"); } catch {}

  // 2) Tables structurées (prioritaires : elles écrasent l'ancien format)
  const subjList = subjects.data || [];
  if (subjList.length) {
    _origSet("app_subjects", JSON.stringify(subjList.map(s => ({ id:s.id, nom:s.nom, soustitre:s.soustitre, couleur:s.couleur, emoji:s.emoji }))));
    subjList.forEach(s => {
      const subjThemes = (themes.data||[]).filter(t => t.subject_id === s.id);
      const nested = subjThemes.map(t => ({
        id:t.id, titre:t.titre,
        sousThemes:(sousThemes.data||[]).filter(st => st.theme_id === t.id).map(st => ({ id:st.id, titre:st.titre }))
      }));
      _origSet(`subj_${s.id}_themes`, JSON.stringify(nested));
      subjThemes.forEach(t => _origSet(`theme_${t.id}_titre`, t.titre));
    });
    (sousThemes.data||[]).forEach(st => _origSet(`${st.id}_titre`, st.titre));

    // Quiz par sous-thème (id serveur = "<stid>__<localId>")
    const quizBySt = {};
    (quiz.data||[]).forEach(q => { (quizBySt[q.sous_theme_id] ||= []).push(q); });
    Object.entries(quizBySt).forEach(([stid, qs]) => {
      const local = qs.map(q => {
        const localId = q.id.startsWith(stid + "__") ? q.id.slice(stid.length + 2) : q.id;
        _origSet(`${stid}_q_${localId}_q`, q.question);
        _origSet(`${stid}_q_${localId}_a`, q.answer);
        return { id:localId, question:q.question, answer:q.answer, known:q.is_known };
      });
      _origSet(`${stid}_quiz`, JSON.stringify(local));
    });

    // Canvas par sous-thème
    const cvBySt = {};
    (canvas.data||[]).forEach(c => { (cvBySt[c.sous_theme_id] ||= []).push(c); });
    Object.entries(cvBySt).forEach(([stid, cs]) => {
      const local = cs.map(c => ({
        id: c.id.startsWith(stid + "__") ? c.id.slice(stid.length + 2) : c.id,
        title:c.title, color:c.color, x:c.x, y:c.y, w:c.w, h:c.h,
        type:c.type, content:c.content, imgRatio:c.img_ratio || undefined
      }));
      _origSet(`${stid}_canvas_state`, JSON.stringify(local));
    });

    // 2bis) Fusion : matières legacy absentes des tables structurées
    //       (ex : créées avec l'ancienne version du site) → on les
    //       réintègre et on les pousse vers le nouveau format.
    const structuredIds = new Set(subjList.map(s => s.id));
    const missing = legacySubjects.filter(s => s && s.id && !structuredIds.has(s.id));
    if (missing.length) {
      const merged = subjList.map(s => ({ id:s.id, nom:s.nom, soustitre:s.soustitre, couleur:s.couleur, emoji:s.emoji })).concat(missing);
      _origSet("app_subjects", JSON.stringify(merged));
      _pushSubjects(JSON.stringify(merged));
      missing.forEach(s => {
        const tk = `subj_${s.id}_themes`;
        const tRaw = localStorage.getItem(tk);
        if (!tRaw) return;
        _pushThemes(s.id, tRaw);
        try {
          JSON.parse(tRaw).forEach(t => (t.sousThemes||[]).forEach(st => {
            const q = localStorage.getItem(`${st.id}_quiz`);
            if (q) _pushQuiz(st.id, q);
            const cv = localStorage.getItem(`${st.id}_canvas_state`);
            if (cv) _pushCanvas(st.id, cv);
          }));
        } catch {}
      });
    }
  } else {
    // 3) Migration : serveur structuré vide mais anciennes données présentes
    const subjRaw = localStorage.getItem("app_subjects");
    if (subjRaw) {
      _pushSubjects(subjRaw);
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i); if (!k) continue;
        let m;
        if ((m = k.match(/^subj_(.+)_themes$/)))   _pushThemes(m[1], localStorage.getItem(k));
        else if ((m = k.match(/^(.+)_quiz$/)))     _pushQuiz(m[1], localStorage.getItem(k));
        else if ((m = k.match(/^(.+)_canvas_state$/))) _pushCanvas(m[1], localStorage.getItem(k));
      }
    }
  }
};
const DB = {
  read:    k      => { try { return localStorage.getItem(k); }               catch { return null; } },
  write:   (k,v)  => { try { localStorage.setItem(k, v); }                   catch {} },
  readJ:   (k,fb) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):fb; } catch { return fb; } },
  writeJ:  (k,v)  => { try { localStorage.setItem(k,JSON.stringify(v)); }    catch {} },
  readImg: k      => { try { return localStorage.getItem("img_"+k); }        catch { return null; } },
  writeImg:(k,v)  => { try { localStorage.setItem("img_"+k,v); }             catch {} },
};
const useViewport = () => {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return { isMobile: w < 768, isTablet: w >= 768 && w < 1024 };
};

// ════════════════════════════════════════════════════════════════
//  DONNÉES
// ════════════════════════════════════════════════════════════════
const SUBJECT_COLORS = ["#2454A0","#B85820","#2a8a4a","#7a3a9a","#1a7a7a","#c44020","#4a6a9a","#8a6a20"];
const SUBJECT_EMOJIS = ["📚","🔬","📐","🌍","📖","🎨","💻","🏛"];
const DNL_DEFAULT_THEMES = [
  { id:"t1", titre:"Titre du Thème 1", sousThemes:[
    { id:"t1s1", titre:"Titre du Sous-thème 1.1" },
    { id:"t1s2", titre:"Titre du Sous-thème 1.2" },
  ]},
  { id:"t2", titre:"Titre du Thème 2", sousThemes:[
    { id:"t2s1", titre:"Titre du Sous-thème 2.1" },

    { id:"t2s3", titre:"Titre du Sous-thème 2.3" },

  ]},
  { id:"t3", titre:"Titre du Thème 3", sousThemes:[
    { id:"t3s1", titre:"Titre du Sous-thème 3.1" },
  ]},
];
const DEFAULT_SUBJECTS = [
  { id:"subj_dnl", nom:"DNL", soustitre:"Geschichte & Géographie", couleur:"#2454A0", emoji:"🌍" }
];

// ════════════════════════════════════════════════════════════════
//  ICONS — SF Symbols-inspired SVG set
// ════════════════════════════════════════════════════════════════
const Ic = {
  menu:      (s=18)=><svg width={s} height={s} viewBox="0 0 18 18" fill="none"><path d="M2.5 5h13M2.5 9h13M2.5 13h8" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>,

const E = ({ defaultVal, storageKey, tag="div", ph="Cliquez pour éditer", style={}, onChange }) => {
  const Elem = tag;
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const saved = localStorage.getItem(storageKey);
    ref.current.textContent = saved !== null ? saved : (defaultVal || "");
  }, [storageKey]);
  const save = () => {
    if (!ref.current) return;
    const val = ref.current.textContent;
    localStorage.setItem(storageKey, val);
    onChange?.(val);
  };
  return <Elem ref={ref} contentEditable suppressContentEditableWarning onBlur={save} data-ph={ph} style={{ outline:"none", ...style }} />;
};

const ImgSlot = ({ storageKey, height=140 }) => {
  const [src, setSrc] = useState(() => {
    try { return localStorage.getItem("img_" + storageKey) || null; } catch { return null; }
  });
  const charger = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const r = new FileReader();
    r.onload = (e) => { setSrc(e.target.result); try { localStorage.setItem("img_" + storageKey, e.target.result); } catch {} };
    r.readAsDataURL(file);
  };
  return (
    <div onClick={() => { const i=document.createElement("input"); i.type="file"; i.accept="image/*"; i.onchange=e=>charger(e.target.files[0]); i.click(); }}
      onDrop={e => { e.preventDefault(); charger(e.dataTransfer.files[0]); }}
      onDragOver={e => e.preventDefault()}
      style={{ width:"100%", height, borderRadius:10, overflow:"hidden", cursor:"pointer", position:"relative",
        background: src ? "#000" : "rgba(255,255,255,0.06)",
        border: src ? "none" : "1.5px dashed rgba(255,255,255,0.20)",
        display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      {src
        ? <img src={src} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
        : <div style={{ color:"var(--l4)", fontSize:12, textAlign:"center", padding:10, userSelect:"none" }}>
            <div style={{marginBottom:4}}>{Ic.image(22)}</div>Cliquer ou glisser une image
          </div>}
      {src && <div style={{ position:"absolute", top:6, right:6, background:"rgba(0,0,0,.60)", color:"#fff", fontSize:10, padding:"2px 7px", borderRadius:4, pointerEvents:"none", backdropFilter:"blur(8px)" }}>✎ remplacer</div>}

const PDFJS_VER    = "3.11.174";
const PDFJS_CDN    = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.min.js`;
const PDFJS_WORKER = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.worker.min.js`;
const loadPDFJS = () => new Promise((resolve, reject) => {
  if (window.pdfjsLib) { window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER; resolve(window.pdfjsLib); return; }
  const s = document.createElement("script"); s.src = PDFJS_CDN;
  s.onload = () => { window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER; resolve(window.pdfjsLib); };
  s.onerror = () => reject(new Error("Impossible de charger PDF.js"));
  document.head.appendChild(s);
});

const ANNOT_TOOLS = {
  stylo:     { label:"Stylo",     wFactor:2, alpha:1,    comp:"source-over",     cursor:"crosshair", pressure:true             },
  surligner: { label:"Surligner", alpha:0.38,             comp:"source-over",     cursor:"crosshair",               mode:"rect" },
  souligner: { label:"Souligner", alpha:1,                comp:"source-over",     cursor:"crosshair",               mode:"rect" },
  gomme:     { label:"Gomme",     wFactor:8, alpha:1,    comp:"destination-out", cursor:"cell",      pressure:false            },
};
const PEN_COLORS = ["#e8eaf6","#60a5fa","#f87171","#4ade80","#fb923c"];
const HL_COLORS  = ["#fbbf24","#86efac","#93c5fd","#f9a8d4","#c4b5fd"];

const PDFPageView = ({ page, pageIdx, annotKey, tool, color, penSize, onRegister, editMode }) => {
  const pdfRef=useRef(null), annotRef=useRef(null), previewRef=useRef(null), vpRef=useRef(null);
  const histRef=useRef([]), drawing=useRef(false), selStart=useRef(null);
  const [ready, setReady] = useState(false);
  const isRectTool = editMode && ANNOT_TOOLS[tool]?.mode === "rect";
  const isFreehand = editMode && !isRectTool;
  const cfg = ANNOT_TOOLS[tool] || ANNOT_TOOLS.stylo;

  useEffect(() => {
    if (!page || !pdfRef.current) return;
    const dpr=window.devicePixelRatio||1, SCALE=2.5;
    const vp=page.getViewport({ scale:SCALE }); vpRef.current=vp;
    const cv=pdfRef.current;
    cv.width=Math.floor(vp.width*dpr); cv.height=Math.floor(vp.height*dpr);
    cv.style.width="100%"; cv.style.height="auto";
    const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
    page.render({ canvasContext:ctx, viewport:vp }).promise.then(()=>setReady(true)).catch(console.warn);
  }, [page]);

  useEffect(() => {
    if (!ready||!annotRef.current||!pdfRef.current) return;
    const pc=pdfRef.current;
    [annotRef.current,previewRef.current].filter(Boolean).forEach(c=>{
      c.width=pc.width; c.height=pc.height; c.style.width="100%"; c.style.height="100%";
    });
    const ac=annotRef.current, ctx=ac.getContext("2d");
    ctx.clearRect(0,0,ac.width,ac.height);
    const saved=localStorage.getItem(`img_annot_${annotKey}_p${pageIdx}`);
    const finalize=()=>{ histRef.current=[ac.toDataURL("image/png")]; };
    if (saved) { const img=new Image(); img.onload=()=>{ctx.drawImage(img,0,0);finalize();}; img.onerror=finalize; img.src=saved; }
    else finalize();
  }, [ready, annotKey, pageIdx]);

  useEffect(() => {
    if (!ready||!annotRef.current) return;
    onRegister(pageIdx, {
      undo: () => {
        if (histRef.current.length<=1||!annotRef.current) return false;
        histRef.current.pop();
        const prev=histRef.current[histRef.current.length-1];
        const ctx=annotRef.current.getContext("2d");
        ctx.clearRect(0,0,annotRef.current.width,annotRef.current.height);
        const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0); img.src=prev;
        if (histRef.current.length===1) localStorage.removeItem(`img_annot_${annotKey}_p${pageIdx}`);
        else localStorage.setItem(`img_annot_${annotKey}_p${pageIdx}`,prev);
        return true;
      },
      clear: () => {
        if (!annotRef.current) return;
        const ctx=annotRef.current.getContext("2d");
        ctx.clearRect(0,0,annotRef.current.width,annotRef.current.height);
        histRef.current=[annotRef.current.toDataURL("image/png")];
        localStorage.removeItem(`img_annot_${annotKey}_p${pageIdx}`);
      },
    });
  }, [ready, annotKey, pageIdx, tool, color, penSize, onRegister]);

  const getPos=(e)=>{
    const ac=annotRef.current; if (!ac) return {x:0,y:0,p:0.5};
    const rect=ac.getBoundingClientRect();
    return { x:(e.clientX-rect.left)*(ac.width/rect.width), y:(e.clientY-rect.top)*(ac.height/rect.height), p:Math.max(0.05,e.pressure||0.5) };
  };
  const applyCtx=(ctx,pressure=0.5)=>{
    const dpr=window.devicePixelRatio||1;
    ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.globalCompositeOperation=cfg.comp;
    ctx.strokeStyle=tool==="gomme"?"rgba(0,0,0,1)":color;
    ctx.globalAlpha=cfg.alpha;
    ctx.lineWidth=penSize*cfg.wFactor*(cfg.pressure?(0.4+pressure*1.4):1)*dpr;
  };
  const onDown=(e)=>{
    if (!annotRef.current) return; e.preventDefault();
    try { annotRef.current.setPointerCapture(e.pointerId); } catch {}
    drawing.current=true;
    const pos=getPos(e), ctx=annotRef.current.getContext("2d");
    applyCtx(ctx,pos.p); ctx.beginPath(); ctx.moveTo(pos.x,pos.y);
  };
  const onMove=(e)=>{
    if (!drawing.current||!annotRef.current) return; e.preventDefault();
    const pos=getPos(e), ctx=annotRef.current.getContext("2d");
    applyCtx(ctx,pos.p); ctx.lineTo(pos.x,pos.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pos.x,pos.y);
  };
  const onUp=(e)=>{
    if (!drawing.current||!annotRef.current) return;
    drawing.current=false;
    const dataURL=annotRef.current.toDataURL("image/png");
    histRef.current=[...histRef.current,dataURL];
    localStorage.setItem(`img_annot_${annotKey}_p${pageIdx}`,dataURL);
  };
  const getVPPos=(e)=>{
    const cv=pdfRef.current, vp=vpRef.current; if (!cv||!vp) return {x:0,y:0};
    const rect=cv.getBoundingClientRect();
    return { x:(e.clientX-rect.left)*vp.width/rect.width, y:(e.clientY-rect.top)*vp.height/rect.height };
  };
  const onRectDown=(e)=>{ e.preventDefault(); try { previewRef.current?.setPointerCapture(e.pointerId); } catch {}; selStart.current=getVPPos(e); };
  const onRectMove=(e)=>{
    if (!selStart.current||!previewRef.current) return; e.preventDefault();
    const dpr=window.devicePixelRatio||1, pos=getVPPos(e);
    const ctx=previewRef.current.getContext("2d");
    ctx.clearRect(0,0,previewRef.current.width,previewRef.current.height);
    const x1=Math.min(selStart.current.x,pos.x)*dpr, y1=Math.min(selStart.current.y,pos.y)*dpr;
    const w=Math.abs(pos.x-selStart.current.x)*dpr, h=Math.abs(pos.y-selStart.current.y)*dpr;
    ctx.save(); ctx.globalAlpha=0.15; ctx.fillStyle=color; ctx.fillRect(x1,y1,w,h);
    ctx.globalAlpha=0.7; ctx.strokeStyle=color; ctx.lineWidth=1.5*dpr; ctx.setLineDash([5*dpr,3*dpr]);
    ctx.strokeRect(x1,y1,w,h); ctx.restore();
  };
  const onRectUp=(e)=>{
    if (!selStart.current||!annotRef.current||!previewRef.current) return;
    previewRef.current.getContext("2d").clearRect(0,0,previewRef.current.width,previewRef.current.height);
    const pos=getVPPos(e), dpr=window.devicePixelRatio||1;
    const x=Math.min(selStart.current.x,pos.x)*dpr, y=Math.min(selStart.current.y,pos.y)*dpr;
    const w=Math.abs(pos.x-selStart.current.x)*dpr, h=Math.abs(pos.y-selStart.current.y)*dpr;
    selStart.current=null; if (w<2||h<2) return;
    const ctx=annotRef.current.getContext("2d"); ctx.save();
    if (tool==="surligner") { ctx.globalAlpha=0.38; ctx.globalCompositeOperation="source-over"; ctx.fillStyle=color; ctx.fillRect(x,y,w,h); }
    else { ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over"; ctx.strokeStyle=color; ctx.lineWidth=2.5*dpr; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke(); }
    ctx.restore();
    const dataURL=annotRef.current.toDataURL("image/png");
    histRef.current=[...histRef.current,dataURL];
    localStorage.setItem(`img_annot_${annotKey}_p${pageIdx}`,dataURL);
  };

  return (
    <div style={{ position:"relative", marginBottom:10, background:"#fff", boxShadow:"0 4px 20px rgba(0,0,0,.30)", borderRadius:4, overflow:"hidden" }}>
      <div style={{ position:"absolute", top:5, left:7, fontSize:9, color:"rgba(0,0,0,.22)", pointerEvents:"none", zIndex:4, fontWeight:600 }}>p.{pageIdx+1}</div>
      <canvas ref={pdfRef} style={{ display:"block", width:"100%", height:"auto" }} />
      {ready && <canvas ref={annotRef} style={{ position:"absolute", inset:0, width:"100%", height:"100%", touchAction:isFreehand?"none":"auto", cursor:isFreehand?cfg.cursor:"default", pointerEvents:isFreehand?"auto":"none", zIndex:1 }} onPointerDown={isFreehand?onDown:undefined} onPointerMove={isFreehand?onMove:undefined} onPointerUp={isFreehand?onUp:undefined} onPointerLeave={isFreehand?onUp:undefined} />}
      {ready && <canvas ref={previewRef} style={{ position:"absolute", inset:0, width:"100%", height:"100%", touchAction:isRectTool?"none":"auto", cursor:isRectTool?"crosshair":"default", pointerEvents:isRectTool?"auto":"none", zIndex:2 }} onPointerDown={isRectTool?onRectDown:undefined} onPointerMove={isRectTool?onRectMove:undefined} onPointerUp={isRectTool?onRectUp:undefined} onPointerLeave={isRectTool?onRectUp:undefined} />}
    </div>
  );
};

const PDFAnnotator = ({ pdfData, pdfName, annotKey, onRemove }) => {
  const [pdfPages,setPdfPages]=useState([]), [loading,setLoading]=useState(true), [loadError,setLoadError]=useState("");
  const [tool,setTool]=useState("stylo"), [color,setColor]=useState(PEN_COLORS[0]);
  const [penSize,setPenSize]=useState(2), [fullscreen,setFullscreen]=useState(false);
  const [editMode,setEditMode]=useState(false), [zoom,setZoom]=useState(1);
  const pageAPIs=useRef({}), containerRef=useRef(null), zoomRef=useRef(1);
  useEffect(()=>{ zoomRef.current=zoom; },[zoom]);

  useEffect(()=>{
    const el=containerRef.current; if (!el) return;
    const onWheel=(e)=>{ if(e.ctrlKey||e.metaKey){e.preventDefault();setZoom(z=>Math.max(0.3,Math.min(3,z*(e.deltaY<0?1.1:0.9))));} };
    el.addEventListener("wheel",onWheel,{passive:false}); return ()=>el.removeEventListener("wheel",onWheel);
  },[]);

  useEffect(()=>{
    if (!pdfData) return; setLoading(true); setLoadError(""); setPdfPages([]);
    loadPDFJS().then(lib=>lib.getDocument(pdfData).promise).then(async pdf=>{
      const pages=[]; for (let i=1;i<=pdf.numPages;i++) pages.push(await pdf.getPage(i));
      setPdfPages(pages); setLoading(false);
    }).catch(e=>{setLoadError("Erreur : "+e.message);setLoading(false);});
  },[pdfData]);

  const registerPage=(idx,api)=>{pageAPIs.current[idx]=api;};
  const handleUndo=()=>{ for(let i=pdfPages.length-1;i>=0;i--) if(pageAPIs.current[i]?.undo()) break; };
  const handleClearAll=()=>{ if(!confirm("Effacer toutes les annotations ?")) return; Object.values(pageAPIs.current).forEach(api=>api?.clear()); };
  const isHl=tool==="surligner"; const colorSet=isHl?HL_COLORS:PEN_COLORS;

const DossierView = ({ st, sid, onTitleChange }) => {
  const k=(id)=>sid+"_"+id;
  const [pdf,setPdf]=useState(()=>{ try{return localStorage.getItem(k("pdf"))||null;}catch{return null;} });
  const [pdfName,setPdfName]=useState(()=>{ try{return localStorage.getItem(k("pdfname"))||"";}catch{return "";} });
  const [dragOver,setDragOver]=useState(false);

  const loadPdf=(file)=>{
    if (!file) return;
    if (file.type!=="application/pdf"&&!file.name.toLowerCase().endsWith(".pdf")){alert("Merci de déposer un fichier PDF.");return;}
    const r=new FileReader();
    r.onload=e=>{ const data=e.target.result; setPdf(data); setPdfName(file.name); try{localStorage.setItem(k("pdf"),data);}catch{alert("PDF trop volumineux.");} try{localStorage.setItem(k("pdfname"),file.name);}catch{} };
    r.readAsDataURL(file);
  };
  const clearPdf=()=>{ setPdf(null);setPdfName(""); try{localStorage.removeItem(k("pdf"));}catch{} try{localStorage.removeItem(k("pdfname"));}catch{} };

  return (
    <div style={{ display:"flex",flexDirection:"column",padding:"24px 28px",gap:24 }}>
      <E defaultVal={st.titre} storageKey={k("titre")} tag="h1" ph="Titre du sous-thème"
        style={{ fontSize:24,fontWeight:700,lineHeight:1.2,color:"var(--l1)",letterSpacing:"-.01em" }} onChange={onTitleChange} />

      <div>
        <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:12 }}>
          <span style={{ display:"flex",alignItems:"center",gap:7,fontSize:13,fontWeight:600,color:"var(--l3)" }}>{Ic.pdf(14)} Document PDF</span>
          <div style={{ flex:1,height:1,background:"var(--sep)" }} />
        </div>
        {pdf ? (
          <PDFAnnotator pdfData={pdf} pdfName={pdfName} annotKey={sid} onRemove={clearPdf} />
        ) : (
          <div onClick={()=>{const i=document.createElement("input");i.type="file";i.accept="application/pdf";i.onchange=e=>loadPdf(e.target.files[0]);i.click();}}
            onDrop={e=>{e.preventDefault();setDragOver(false);loadPdf(e.dataTransfer.files[0]);}}
            onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
            style={{ border:`1.5px dashed ${dragOver?"var(--blue)":"rgba(255,255,255,0.18)"}`,borderRadius:14,padding:"48px 20px",textAlign:"center",background:dragOver?"rgba(10,132,255,0.08)":"rgba(255,255,255,0.05)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",cursor:"pointer",transition:"all .18s" }}>
            <div style={{ display:"flex",justifyContent:"center",marginBottom:10,color:"var(--l4)" }}>{Ic.pdf(28)}</div>
            <div style={{ fontWeight:600,color:"var(--l2)",marginBottom:4 }}>Glisser un PDF ici</div>
            <div style={{ fontSize:12,color:"var(--l4)" }}>ou cliquer pour parcourir</div>
          </div>
        )}
      </div>

      <div style={{ borderTop:"1px solid var(--sep)",paddingTop:22 }}>
        <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:14 }}>
          <span style={{ display:"flex",alignItems:"center",gap:7,fontSize:13,fontWeight:600,color:"var(--l3)" }}>{Ic.write(14)} Dissertation finale</span>
          <div style={{ flex:1,height:1,background:"var(--sep)" }} />
        </div>
        <div style={{ background:"rgba(255,255,255,0.05)",borderRadius:10,padding:"10px 14px",marginBottom:14,border:"1px solid var(--sep)",display:"flex",gap:8,alignItems:"center" }}>
          <span style={{ fontSize:12,color:"var(--l4)",flexShrink:0 }}>Sujet :</span>
          <E defaultVal={st.dissertation||""} storageKey={k("diss")} tag="span" ph="Sujet de la dissertation..." style={{ fontSize:14,color:"var(--l1)",fontWeight:500,flex:1 }} />
        </div>
        <E defaultVal="" storageKey={k("disstxt")} tag="div" ph="Rédiger la dissertation ici..."
          style={{ fontSize:14,lineHeight:1.9,color:"var(--l1)",minHeight:320,padding:"14px 16px",border:"1px solid rgba(255,255,255,0.09)",borderRadius:12,background:"rgba(255,255,255,0.05)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)" }} />

const Lightbox = ({ src, type, name, onClose }) => {
  useEffect(()=>{ const fn=e=>{if(e.key==="Escape")onClose();}; document.addEventListener("keydown",fn); document.body.style.overflow="hidden"; return()=>{document.removeEventListener("keydown",fn);document.body.style.overflow="";};}, []);
  return ReactDOM.createPortal(
    <div onClick={onClose} style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.96)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",padding:"50px 20px 20px" }}>
      <button onClick={onClose} style={{ position:"absolute",top:14,right:18,background:"rgba(255,255,255,.10)",color:"#fff",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(16px)" }}>{Ic.close(12)}</button>
      {type==="pdf"
        ? <object data={src} type="application/pdf" onClick={e=>e.stopPropagation()} style={{ width:"100%",height:"100%",background:"#fff",borderRadius:4 }}><div style={{ padding:20,textAlign:"center",color:"#fff" }}><a href={src} download={name||"document.pdf"} style={{color:"#60a5fa"}}>Télécharger</a></div></object>
        : <img src={src} alt="" onClick={e=>e.stopPropagation()} style={{ maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:6 }} />}
    </div>, document.body
  );
};

const CanvasCard = ({ card, sid, onDragStart, onResizeStart, onUpdate, onDelete, isDragging, isResizing }) => {
  const titleRef=useRef(null), contentRef=useRef(null);
  const imgKey=`${sid}_cv_img_${card.id}`;
  const [imgSrc,setImgSrc]=useState(()=>{ try{return localStorage.getItem(imgKey)||null;}catch{return null;} });
  const [lightbox,setLightbox]=useState(false);

  useEffect(()=>{ if(titleRef.current) titleRef.current.textContent=card.title; if(contentRef.current) contentRef.current.textContent=card.content||""; },[]);
  useEffect(()=>{
    if(imgSrc&&!card.imgRatio){const probe=new Image();probe.onload=()=>{const ratio=probe.naturalWidth/probe.naturalHeight;if(ratio>0)onUpdate({imgRatio:ratio,h:Math.max(80,Math.round(card.w/ratio))});};probe.src=imgSrc;}
  },[imgSrc]);

  const loadImg=(file)=>{
    if(!file||!file.type.startsWith("image/")) return;
    const r=new FileReader();
    r.onload=e=>{
      const probe=new Image(); probe.onload=()=>{
        const compress=(maxDim,quality)=>{
          const scale=Math.min(1,maxDim/Math.max(probe.naturalWidth,probe.naturalHeight));
          const cw=Math.round(probe.naturalWidth*scale),ch=Math.round(probe.naturalHeight*scale);
          const canvas=document.createElement("canvas");canvas.width=cw;canvas.height=ch;
          const ctx=canvas.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,cw,ch);ctx.drawImage(probe,0,0,cw,ch);
          return{data:canvas.toDataURL("image/jpeg",quality),cw,ch};
        };
        for(const[max,q] of [[1400,.85],[1100,.80],[850,.75],[650,.70],[500,.65]]){
          const{data,cw,ch}=compress(max,q);
          try{localStorage.setItem(imgKey,data);setImgSrc(data);onUpdate({imgRatio:cw/ch,h:Math.max(80,Math.round(card.w/(cw/ch))+26)});return;}catch{}
        }
        alert("Espace de stockage saturé.");
      };
      probe.src=e.target.result;
    };
    r.readAsDataURL(file);
  };

  const active=isDragging||isResizing;
  return (
    <div style={{ position:"absolute",top:card.y,left:card.x,width:card.w,height:card.h,border:`1px solid ${card.color}55`,borderRadius:12,background:"rgba(14,16,30,0.90)",backdropFilter:"blur(24px) saturate(180%)",WebkitBackdropFilter:"blur(24px) saturate(180%)",boxShadow:active?`0 16px 48px rgba(0,0,0,.55),0 0 0 2px ${card.color}88,inset 0 1px 0 rgba(255,255,255,0.12)`:`0 4px 20px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,0.08)`,zIndex:active?100:1,transition:active?"none":"box-shadow .15s",overflow:"hidden" }}>
      <div onPointerDown={onDragStart} style={{ background:`linear-gradient(90deg,${card.color}cc,${card.color}88)`,padding:"5px 8px 5px 10px",display:"flex",alignItems:"center",gap:5,cursor:isDragging?"grabbing":"grab",userSelect:"none",flexShrink:0,touchAction:"none" }}>
        <span style={{ color:"rgba(255,255,255,0.35)",display:"flex" }}>{Ic.grab(10)}</span>
        <span ref={titleRef} contentEditable suppressContentEditableWarning onBlur={e=>onUpdate({title:e.currentTarget.textContent})} onPointerDown={e=>e.stopPropagation()} style={{ flex:1,fontSize:11.5,fontWeight:700,color:"rgba(255,255,255,0.92)",outline:"none",cursor:"text" }} />
        <button onClick={onDelete} onPointerDown={e=>e.stopPropagation()} style={{ background:"none",border:"none",color:"rgba(255,255,255,0.38)",cursor:"pointer",padding:"0 3px",lineHeight:1,flexShrink:0,display:"flex" }}>{Ic.close(10)}</button>
      </div>
      <div style={{ padding:card.type==="image"?0:"8px 10px",height:"calc(100% - 26px)",overflow:"hidden" }}>
        {card.type==="image" ? (
          <>
            <div onClick={()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>loadImg(e.target.files[0]);i.click();}} onDrop={e=>{e.preventDefault();loadImg(e.dataTransfer.files[0]);}} onDragOver={e=>e.preventDefault()} onPointerDown={e=>e.stopPropagation()} style={{ width:"100%",height:"100%",cursor:"pointer",overflow:"hidden",position:"relative",display:"flex",alignItems:"center",justifyContent:"center" }}>
              {imgSrc ? <img src={imgSrc} alt="" style={{ width:"100%",height:"100%",objectFit:"cover",display:"block" }} /> : <div style={{ color:"var(--l4)",textAlign:"center",fontSize:12,userSelect:"none" }}>{Ic.image(22)}<br/>Cliquer ou glisser</div>}
              {imgSrc && <><button onClick={e=>{e.stopPropagation();setLightbox(true);}} onPointerDown={e=>e.stopPropagation()} style={{ position:"absolute",top:4,left:4,background:"rgba(0,0,0,.65)",color:"#fff",border:"none",width:24,height:24,borderRadius:5,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center" }}>{Ic.maximize(10)}</button><div style={{ position:"absolute",top:4,right:4,background:"rgba(0,0,0,.55)",color:"rgba(255,255,255,0.7)",fontSize:10,padding:"2px 6px",borderRadius:4,pointerEvents:"none" }}>✎</div></>}
            </div>
            {lightbox&&imgSrc&&<Lightbox src={imgSrc} type="image" onClose={()=>setLightbox(false)} />}
          </>
        ) : (
          <div ref={contentRef} contentEditable suppressContentEditableWarning onBlur={e=>onUpdate({content:e.currentTarget.textContent})} onPointerDown={e=>e.stopPropagation()} data-ph="Cliquez pour éditer..." style={{ outline:"none",fontSize:12.5,lineHeight:1.7,color:"rgba(255,255,255,0.80)",height:"100%",cursor:"text",whiteSpace:"pre-wrap",overflowY:"auto" }} />
        )}
      </div>
      <div onPointerDown={e=>{e.stopPropagation();onResizeStart(e);}} style={{ position:"absolute",bottom:0,right:0,width:20,height:20,cursor:"se-resize",display:"flex",alignItems:"flex-end",justifyContent:"flex-end",padding:"4px",touchAction:"none",zIndex:2 }}>
        <svg width="8" height="8"><path d="M1 7L7 7L7 1" fill="none" stroke="rgba(255,255,255,0.22)" strokeWidth="1.5" strokeLinecap="round"/></svg>
      </div>
    </div>
  );
};

// Le canvas fait 3000×2000 → tout part du centre (1500,1000)
const CANVAS_CX=1500, CANVAS_CY=1000;
const TYPE_ICONS={ liste:"📌", definition:"📖", chronologie:"📅", exemple:"💡" };
const buildAICards=(data)=>{
  const ts=Date.now(), cards=[];
  // Nœud central au milieu du calque
  const cw=420, ch=120;
  cards.push({id:`ai_${ts}_c`,title:"🎯 "+(data.titre||"Thème"),color:"#c96a2a",x:CANVAS_CX-cw/2,y:CANVAS_CY-ch/2,w:cw,h:ch,type:"text",content:"🎯 "+(data.titre||"")});
  // Branches en cercle autour du centre
  const branches=(data.branches||[]).slice(0,8), n=Math.max(branches.length,1);
  const rx=560, ry=420, bw=300;
  branches.forEach((b,i)=>{
    const angle=-Math.PI/2+(2*Math.PI*i)/n;
    const lines=(b.contenu||"").split("\n").length;
    const bh=Math.max(170,56+lines*22);
    const emoji=b.emoji||TYPE_ICONS[b.type]||"📌";
    const titre=b.titre||("Branche "+(i+1));
    cards.push({
      id:`ai_${ts}_${i}`,
      title:emoji+" "+titre,
      color:b.couleur||CARD_COLORS[i%CARD_COLORS.length],
      x:CANVAS_CX+rx*Math.cos(angle)-bw/2,
      y:CANVAS_CY+ry*Math.sin(angle)-bh/2,
      w:bw,h:bh,type:"text",content:b.contenu||""
    });
  });
  return cards;
};

// Appel Gemini générique (mindmap + quiz)
const callGemini=async(prompt)=>{
  const MODELS=["gemini-2.5-flash","gemini-2.5-flash-preview-05-20","gemini-2.0-flash"];
  const DELAYS=[0,3000,6000];
  let json,res,lastErr="";
  outer: for(const model of MODELS){
    for(let attempt=0;attempt<3;attempt++){
      if(DELAYS[attempt]>0) await new Promise(r=>setTimeout(r,DELAYS[attempt]));
      res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.65,maxOutputTokens:16384}})});
      json=await res.json();
      if(res.ok) break outer;
      lastErr=json.error?.message||`Erreur HTTP ${res.status}`;
      const isOverloaded=res.status===503||(lastErr||"").toLowerCase().includes("demand");
      if(!isOverloaded) break outer;
    }
    if(!res.ok) continue; break;
  }
  if(!res.ok) throw new Error(lastErr||`Erreur HTTP ${res.status}`);
  let raw=json.candidates?.[0]?.content?.parts?.[0]?.text||"";
  if(!raw) throw new Error("Gemini n'a renvoyé aucun texte. Réessaie.");
  raw=raw.replace(/^```(?:json)?\s*/i,"").replace(/\s*```\s*$/i,"").trim();
  const jsonStart=raw.indexOf("{"),jsonEnd=raw.lastIndexOf("}");
  if(jsonStart!==-1&&jsonEnd!==-1) raw=raw.slice(jsonStart,jsonEnd+1);
  try{return JSON.parse(raw);}catch(e){throw new Error("Réponse JSON invalide de Gemini.\n"+e.message);}
};

const extractPDFText=async(sid)=>{
  const pdfData=localStorage.getItem(`${sid}_pdf`);
  if(!pdfData) return null;
  await loadPDFJS();
  const pdfDoc=await window.pdfjsLib.getDocument(pdfData).promise;
  let pdfText="";
  for(let p=1;p<=pdfDoc.numPages;p++){const page=await pdfDoc.getPage(p);const tc=await page.getTextContent();pdfText+=tc.items.map(it=>it.str).join(" ")+"\n";}
  return pdfText.trim().slice(0,60000)||null;
};

        <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:22 }}>
          <div style={{ width:42,height:42,borderRadius:12,background:"linear-gradient(135deg,#0A84FF 0%,#5856D6 100%)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 4px 16px rgba(10,132,255,0.40)" }}>{Ic.sparkle(20)}</div>

const MindmapCanvas = ({ sid }) => {
  const lsKey=`${sid}_canvas_state`, counter=useRef(100);
  const [cards,setCards]=useState(()=>{ try{const s=localStorage.getItem(lsKey);return s?JSON.parse(s):CANVAS_DEFAULTS.map(c=>({...c}));}catch{return CANVAS_DEFAULTS.map(c=>({...c}));} });
  const [dragging,setDragging]=useState(null), [resizing,setResizing]=useState(null);
  const [zoom,setZoom]=useState(1), zoomRef=useRef(1);
  useEffect(()=>{zoomRef.current=zoom;},[zoom]);
  const containerRef=useRef(null), [showGemini,setShowGemini]=useState(false);

  // Zoom ancré au centre de la vue : le point au milieu de l'écran reste fixe
  const zoomAt=(next)=>{
    const el=containerRef.current;
    setZoom(z=>{
      const nz=Math.max(0.3,Math.min(2,typeof next==="function"?next(z):next));
      if(el&&nz!==z){
        const cx=(el.scrollLeft+el.clientWidth/2)/z, cy=(el.scrollTop+el.clientHeight/2)/z;
        requestAnimationFrame(()=>{ el.scrollLeft=cx*nz-el.clientWidth/2; el.scrollTop=cy*nz-el.clientHeight/2; });
      }
      return nz;
    });
  };
  const zoomAtRef=useRef(zoomAt); zoomAtRef.current=zoomAt;

  useEffect(()=>{
    const el=containerRef.current; if(!el) return;
    const onWheel=(e)=>{if(e.ctrlKey||e.metaKey){e.preventDefault();zoomAtRef.current(z=>z*(e.deltaY<0?1.08:0.93));}};
    el.addEventListener("wheel",onWheel,{passive:false}); return()=>el.removeEventListener("wheel",onWheel);
  },[]);

  // Au montage : centrer la vue sur le contenu réel (ou le milieu du calque si vide)
  useEffect(()=>{
    const el=containerRef.current; if(!el) return;
    let cx=CANVAS_CX, cy=CANVAS_CY;
    if(cards.length){
      const minX=Math.min(...cards.map(c=>c.x)), maxX=Math.max(...cards.map(c=>c.x+c.w));
      const minY=Math.min(...cards.map(c=>c.y)), maxY=Math.max(...cards.map(c=>c.y+c.h));
      cx=(minX+maxX)/2; cy=(minY+maxY)/2;
    }
    el.scrollLeft=cx*zoomRef.current-el.clientWidth/2;
    el.scrollTop =cy*zoomRef.current-el.clientHeight/2;
  },[]);

  const persist=(list)=>{try{localStorage.setItem(lsKey,JSON.stringify(list));}catch{}};
  const updateCard=(id,updates)=>setCards(prev=>{const next=prev.map(c=>c.id===id?{...c,...updates}:c);persist(next);return next;});
  const deleteCard=(id)=>setCards(prev=>{const next=prev.filter(c=>c.id!==id);persist(next);return next;});
  const applyAICards=(newCards)=>{
    persist(newCards);setCards(newCards);
    // Recentrer la vue sur la carte générée
    const el=containerRef.current;
    if(el){el.scrollLeft=CANVAS_CX*zoomRef.current-el.clientWidth/2;el.scrollTop=CANVAS_CY*zoomRef.current-el.clientHeight/2;}
  };
  const addCard=(type)=>{
    const id=`card_${counter.current++}`;
    const w=type==="image"?300:340, h=type==="image"?260:220;
    // Nouvelle carte près du centre du calque, léger décalage aléatoire
    const card={id,type,title:type==="image"?"Image / Carte":"Nouveau bloc",color:CARD_COLORS[Math.floor(Math.random()*CARD_COLORS.length)],x:CANVAS_CX-w/2+(Math.random()*240-120),y:CANVAS_CY-h/2+(Math.random()*180-90),w,h,content:""};
    setCards(prev=>{const next=[...prev,card];persist(next);return next;});
  };
  const startDrag=(e,cardId)=>{
    if(!containerRef.current) return;
    const rect=containerRef.current.getBoundingClientRect(), card=cards.find(c=>c.id===cardId);
    setDragging({cardId,ox:(e.clientX-rect.left+containerRef.current.scrollLeft)/zoomRef.current-card.x,oy:(e.clientY-rect.top+containerRef.current.scrollTop)/zoomRef.current-card.y});
    e.preventDefault();
  };
  const startResize=(e,cardId)=>{
    const card=cards.find(c=>c.id===cardId);
    setResizing({cardId,startX:e.clientX,startY:e.clientY,startW:card.w,startH:card.h}); e.preventDefault();
  };
  useEffect(()=>{
    const onMove=(e)=>{
      const z=zoomRef.current;
      if(dragging&&containerRef.current){const rect=containerRef.current.getBoundingClientRect();const x=Math.max(0,(e.clientX-rect.left+containerRef.current.scrollLeft)/z-dragging.ox);const y=Math.max(0,(e.clientY-rect.top+containerRef.current.scrollTop)/z-dragging.oy);setCards(prev=>prev.map(c=>c.id===dragging.cardId?{...c,x,y}:c));}
      if(resizing){const w=Math.max(120,resizing.startW+(e.clientX-resizing.startX)/z);let h=Math.max(60,resizing.startH+(e.clientY-resizing.startY)/z);const card=cards.find(c=>c.id===resizing.cardId);if(card&&card.imgRatio)h=Math.max(80,Math.round((w/card.imgRatio)+26));setCards(prev=>prev.map(c=>c.id===resizing.cardId?{...c,w,h}:c));}
    };
    const onUp=()=>{
      if(dragging){setDragging(null);setCards(prev=>{persist(prev);return prev;});}
      if(resizing){setResizing(null);setCards(prev=>{persist(prev);return prev;});}
    };
    document.addEventListener("pointermove",onMove); document.addEventListener("pointerup",onUp);
    return()=>{document.removeEventListener("pointermove",onMove);document.removeEventListener("pointerup",onUp);};
  },[dragging,resizing]);

  return (
    <div style={{ display:"flex",flexDirection:"column",flex:1,minHeight:0 }}>
      <div style={{ height:48,flexShrink:0,background:"rgba(255,255,255,0.06)",backdropFilter:"blur(32px) saturate(180%)",WebkitBackdropFilter:"blur(32px) saturate(180%)",borderBottom:"1px solid var(--sep)",display:"flex",alignItems:"center",padding:"0 18px",gap:8 }}>
        <span style={{ fontSize:12,color:"var(--l4)" }}>Glisser · Ctrl+molette pour zoomer</span>
        <div style={{ flex:1 }} />
        <div style={{ display:"flex",alignItems:"center",gap:3 }}>
          <button onClick={()=>zoomAt(z=>z*0.9)} style={{ width:28,height:28,background:"rgba(255,255,255,0.08)",color:"var(--l2)",border:"none",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center" }}>{Ic.zoomOut(12)}</button>
          <button onClick={()=>zoomAt(1)} style={{ padding:"0 8px",height:28,background:"rgba(255,255,255,0.08)",color:"var(--l2)",border:"none",borderRadius:8,cursor:"pointer",fontSize:11,minWidth:46 }}>{Math.round(zoom*100)}%</button>
          <button onClick={()=>zoomAt(z=>z*1.1)} style={{ width:28,height:28,background:"rgba(255,255,255,0.08)",color:"var(--l2)",border:"none",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center" }}>{Ic.zoomIn(12)}</button>
        </div>
        <div style={{ width:1,height:18,background:"var(--sep)" }} />
        <button onClick={()=>addCard("image")} style={{ display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:"rgba(255,255,255,0.08)",color:"var(--l2)",border:"1px solid var(--sep)",borderRadius:10,cursor:"pointer",fontSize:12 }}>{Ic.image(13)} Image</button>
        <button onClick={()=>addCard("text")} style={{ display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:"rgba(255,255,255,0.08)",color:"var(--l2)",border:"1px solid var(--sep)",borderRadius:10,cursor:"pointer",fontSize:12 }}>{Ic.textBox(13)} Texte</button>
        <button onClick={()=>setShowGemini(true)} style={{ display:"flex",alignItems:"center",gap:6,padding:"6px 16px",background:"linear-gradient(135deg,#0A84FF,#5856D6)",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:600,boxShadow:"0 2px 12px rgba(10,132,255,0.40)" }}>{Ic.sparkle(13)} Générer avec l'IA</button>
      </div>
      <div ref={containerRef} style={{ flex:1,minHeight:0,overflow:"auto",position:"relative",background:"rgba(255,255,255,0.03)",backgroundImage:"radial-gradient(circle, rgba(255,255,255,0.11) 1px, transparent 1px)",backgroundSize:`${22*zoom}px ${22*zoom}px`,cursor:dragging?"grabbing":resizing?"se-resize":"default" }}>
        <div style={{ width:3000*zoom,height:2000*zoom,position:"relative" }}>
          <div style={{ width:3000,height:2000,position:"relative",transform:`scale(${zoom})`,transformOrigin:"0 0" }}>
            {cards.map(card=><CanvasCard key={card.id} card={card} sid={sid} onDragStart={e=>startDrag(e,card.id)} onResizeStart={e=>startResize(e,card.id)} onUpdate={u=>updateCard(card.id,u)} onDelete={()=>deleteCard(card.id)} isDragging={dragging?.cardId===card.id} isResizing={resizing?.cardId===card.id} />)}
          </div>
        </div>
      </div>
      {showGemini&&<GeminiModal sid={sid} onClose={()=>setShowGemini(false)} onApply={applyAICards} />}
    </div>
  );
};

        {errMsg && <div style={{ background:"rgba(255,69,58,0.10)",border:"1px solid rgba(255,69,58,0.22)",borderRadius:12,padding:"12px 16px",marginBottom:14,whiteSpace:"pre-line" }}><div style={{ fontSize:12,color:"var(--red)" }}>{errMsg}</div></div>}

const QuizView = ({ sid }) => {
  const lsKey=`${sid}_quiz`, ctr=useRef(100);
  const [cards,setCards]=useState(()=>{ try{const s=localStorage.getItem(lsKey);return s?JSON.parse(s):QUIZ_DEFAULTS();}catch{return QUIZ_DEFAULTS();} });
  const [idx,setIdx]=useState(0), [flipped,setFlipped]=useState(false), [showAI,setShowAI]=useState(false);
  const save=list=>{try{localStorage.setItem(lsKey,JSON.stringify(list));}catch{}};
  const go=dir=>{setFlipped(false);setTimeout(()=>setIdx(i=>Math.max(0,Math.min(cards.length-1,i+dir))),120);};
  const toggleKnown=()=>{const next=cards.map((c,i)=>i===idx?{...c,known:!c.known}:c);save(next);setCards(next);};
  const addCard=()=>{const id=`q_${ctr.current++}`;const next=[...cards,{id,question:"Nouvelle question ?",answer:"Réponse à renseigner.",known:false}];save(next);setCards(next);setIdx(next.length-1);setFlipped(false);};
  const applyAI=(items)=>{
    const ts=Date.now();
    const newCards=items.map((it,i)=>({id:`qai_${ts}_${i}`,question:it.question,answer:it.reponse||"",known:false}));
    const next=[...cards,...newCards];
    save(next);setCards(next);setIdx(cards.length);setFlipped(false);
  };
  const delCard=()=>{if(cards.length<=1)return;const next=cards.filter((_,i)=>i!==idx);save(next);setCards(next);setIdx(Math.min(idx,next.length-1));setFlipped(false);};
  const shuffle=()=>{const next=[...cards].sort(()=>Math.random()-.5).map(c=>({...c,known:false}));save(next);setCards(next);setIdx(0);setFlipped(false);};
  const cur=cards[Math.min(idx,cards.length-1)];
  const knownCnt=cards.filter(c=>c.known).length;
  const pct=cards.length?(knownCnt/cards.length)*100:0;

  return (
    <div style={{ flex:1,display:"flex",flexDirection:"column",background:"transparent" }}>
      <div data-np style={{ height:48,flexShrink:0,background:"rgba(255,255,255,0.06)",backdropFilter:"blur(32px) saturate(180%)",WebkitBackdropFilter:"blur(32px) saturate(180%)",borderBottom:"1px solid var(--sep)",display:"flex",alignItems:"center",padding:"0 18px",gap:12 }}>
        <span style={{ fontSize:13,fontWeight:600,color:"var(--blue)" }}>{knownCnt} / {cards.length} connus</span>
        <div style={{ width:80,height:4,background:"rgba(255,255,255,0.10)",borderRadius:2,overflow:"hidden" }}>
          <div style={{ height:"100%",width:`${pct}%`,background:"var(--blue)",borderRadius:2,transition:"width .4s cubic-bezier(0.34,1.2,0.64,1)" }} />
        </div>
        <div style={{ flex:1 }} />
        <button onClick={shuffle} style={{ display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:"rgba(255,255,255,0.08)",color:"var(--l2)",border:"1px solid var(--sep)",borderRadius:10,cursor:"pointer",fontSize:12 }}>{Ic.shuffle(13)} Mélanger</button>
        <button onClick={()=>setShowAI(true)} style={{ display:"flex",alignItems:"center",gap:6,padding:"6px 14px",background:"linear-gradient(135deg,#a78bfa,#7c5cf0)",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:600,boxShadow:"0 2px 10px rgba(167,139,250,0.35)" }}>{Ic.sparkle(13)} IA</button>
        <button onClick={addCard} style={{ display:"flex",alignItems:"center",gap:6,padding:"6px 14px",background:"var(--blue)",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:600,boxShadow:"0 2px 10px rgba(10,132,255,0.35)" }}>{Ic.plus(13)} Carte</button>
      </div>

      <div style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 24px",gap:20 }}>
        <div style={{ fontSize:12,color:"var(--l4)",letterSpacing:".04em" }}>{idx+1} / {cards.length}</div>

        <div onClick={()=>setFlipped(f=>!f)} style={{ width:"100%",maxWidth:640,height:290,perspective:"1400px",cursor:"pointer" }}>
          <div style={{ width:"100%",height:"100%",position:"relative",transformStyle:"preserve-3d",transition:"transform 0.50s cubic-bezier(.4,0,.2,1)",transform:flipped?"rotateY(180deg)":"rotateY(0deg)" }}>
            <div style={{ position:"absolute",inset:0,backfaceVisibility:"hidden",background:"rgba(255,255,255,0.09)",backdropFilter:"blur(32px) saturate(180%)",WebkitBackdropFilter:"blur(32px) saturate(180%)",borderRadius:20,border:"1px solid rgba(255,255,255,0.14)",boxShadow:"0 20px 56px rgba(0,0,0,0.46),inset 0 1px 0 rgba(255,255,255,0.18)",display:"flex",flexDirection:"column",padding:"26px 30px" }}>
              <div style={{ fontSize:10,fontWeight:700,color:"var(--l4)",textTransform:"uppercase",letterSpacing:".10em",marginBottom:16 }}>Question</div>
              <CardField storageKey={`${sid}_q_${cur.id}_q`} defaultVal={cur.question} ph="Rédigez votre question..." style={{ flex:1,fontSize:20,fontWeight:600,color:"var(--l1)",lineHeight:1.55 }} />
              <div style={{ fontSize:11,color:"var(--l4)",textAlign:"center",marginTop:14 }}>Appuyer pour révéler</div>
            </div>
            <div style={{ position:"absolute",inset:0,backfaceVisibility:"hidden",transform:"rotateY(180deg)",background:"rgba(10,132,255,0.16)",backdropFilter:"blur(32px) saturate(180%)",WebkitBackdropFilter:"blur(32px) saturate(180%)",borderRadius:20,border:"1px solid rgba(10,132,255,0.36)",boxShadow:"0 20px 56px rgba(10,132,255,0.22),inset 0 1px 0 rgba(255,255,255,0.20)",display:"flex",flexDirection:"column",padding:"26px 30px" }}>
              <div style={{ fontSize:10,fontWeight:700,color:"rgba(10,132,255,0.85)",textTransform:"uppercase",letterSpacing:".10em",marginBottom:16 }}>Réponse</div>
              <CardField storageKey={`${sid}_q_${cur.id}_a`} defaultVal={cur.answer} ph="Rédigez la réponse..." style={{ flex:1,fontSize:15,color:"var(--l1)",lineHeight:1.75 }} />
            </div>
          </div>
        </div>

        {/* Boutons sur 2 rangées : le texte n'est plus jamais compressé */}
        <div style={{ display:"flex",flexDirection:"column",gap:12,width:"100%",maxWidth:480 }}>
          <div style={{ display:"flex",alignItems:"center",gap:12 }}>
            <button onClick={()=>go(-1)} disabled={idx===0} style={{ width:44,height:44,flexShrink:0,borderRadius:"50%",border:"none",background:idx>0?"rgba(255,255,255,0.10)":"transparent",cursor:idx>0?"pointer":"default",color:idx>0?"var(--l1)":"var(--l4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18 }}>←</button>
            <button onClick={()=>setFlipped(f=>!f)} style={{ flex:1,padding:"12px",borderRadius:50,background:"var(--blue)",color:"#fff",border:"none",cursor:"pointer",fontSize:14,fontWeight:600,boxShadow:"0 3px 14px rgba(10,132,255,0.40)",whiteSpace:"nowrap" }}>Retourner</button>
            <button onClick={()=>go(1)} disabled={idx===cards.length-1} style={{ width:44,height:44,flexShrink:0,borderRadius:"50%",border:"none",background:idx<cards.length-1?"rgba(255,255,255,0.10)":"transparent",cursor:idx<cards.length-1?"pointer":"default",color:idx<cards.length-1?"var(--l1)":"var(--l4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18 }}>→</button>
          </div>
          <div style={{ display:"flex",alignItems:"center",gap:12 }}>
            <button onClick={toggleKnown} style={{ flex:1,padding:"11px",borderRadius:50,cursor:"pointer",fontSize:13,fontWeight:600,border:"none",background:cur.known?"rgba(48,209,88,0.16)":"rgba(255,159,10,0.16)",color:cur.known?"var(--green)":"var(--orange)",boxShadow:cur.known?"0 2px 10px rgba(48,209,88,0.22)":"0 2px 10px rgba(255,159,10,0.22)",display:"flex",alignItems:"center",justifyContent:"center",gap:6,whiteSpace:"nowrap" }}>{cur.known?<>{Ic.check(13)} Connu</>:<>✗ À revoir</>}</button>
            <button onClick={delCard} disabled={cards.length<=1} style={{ width:44,height:44,flexShrink:0,borderRadius:"50%",border:"none",background:cards.length>1?"rgba(255,69,58,0.14)":"transparent",cursor:cards.length>1?"pointer":"default",color:cards.length>1?"var(--red)":"var(--l4)",display:"flex",alignItems:"center",justifyContent:"center" }}>{Ic.trash(13)}</button>
          </div>
        </div>
      </div>
      {showAI&&<QuizAIModal sid={sid} onClose={()=>setShowAI(false)} onApply={applyAI} />}
    </div>
  );
};

const ThemeLabel = ({ themeId, defaultTitle, open }) => {
  const ref=useRef(null), lsKey=`theme_${themeId}_titre`;
  useEffect(()=>{ if(!ref.current) return; ref.current.textContent=localStorage.getItem(lsKey)||defaultTitle; },[themeId]);
  return <span ref={ref} contentEditable suppressContentEditableWarning onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()} onBlur={e=>localStorage.setItem(lsKey,e.currentTarget.textContent)} data-ph="Nom du thème" style={{ flex:1,outline:"none",cursor:"text",color:open?"var(--l1)":"var(--l3)",fontSize:13,fontWeight:open?600:400 }} />;
};

const Sidebar = ({ themes, activePath, onSelect, stTitles, onAddTheme, onDeleteTheme, onAddST, onDeleteST, subjectNom, subjectSoustitre }) => {
  const [expanded,setExpanded]=useState(()=>new Set(themes.length>0?[themes[0].id]:[]));
  useEffect(()=>{ if(activePath[0]) setExpanded(prev=>{const n=new Set(prev);n.add(activePath[0]);return n;}); },[activePath[0]]);
  const toggle=(id)=>setExpanded(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const totalST=themes.reduce((acc,t)=>acc+t.sousThemes.length,0);

  return (
    <aside data-np style={{ width:240,flexShrink:0,background:"rgba(10,12,24,0.96)",backdropFilter:"blur(48px) saturate(220%) brightness(1.08)",WebkitBackdropFilter:"blur(48px) saturate(220%) brightness(1.08)",borderRight:"1px solid rgba(255,255,255,0.07)",display:"flex",flexDirection:"column",overflowY:"auto" }}>
      <div style={{ padding:"18px 18px 14px",borderBottom:"1px solid var(--sep)" }}>
        <div style={{ fontSize:14,fontWeight:700,color:"var(--l1)" }}>{subjectNom||"Matière"}</div>
        {subjectSoustitre&&<div style={{ fontSize:11,color:"var(--l4)",marginTop:3 }}>{subjectSoustitre}</div>}
      </div>

      <div style={{ flex:1,paddingTop:6,overflowY:"auto" }}>
        {themes.map(theme=>{
          const open=expanded.has(theme.id);
          return (
            <div key={theme.id}>
              <div style={{ display:"flex",alignItems:"center",padding:"7px 10px 7px 14px",gap:5 }}>
                <button onClick={()=>toggle(theme.id)} style={{ background:"none",border:"none",cursor:"pointer",color:open?"var(--l2)":"var(--l4)",padding:0,flexShrink:0,display:"flex",alignItems:"center",transition:"transform .2s",transform:open?"rotate(0deg)":"rotate(-90deg)" }}>{Ic.chevDown(11)}</button>
                <ThemeLabel themeId={theme.id} defaultTitle={theme.titre} open={open} />
                <button onClick={()=>onAddST(theme.id)} title="Ajouter un sous-thème" style={{ background:"none",border:"none",cursor:"pointer",color:"var(--l4)",padding:"2px 4px",flexShrink:0,display:"flex",transition:"color .15s" }} onMouseEnter={e=>e.currentTarget.style.color="#60a5fa"} onMouseLeave={e=>e.currentTarget.style.color="var(--l4)"}>{Ic.plus(12)}</button>
                <button onClick={()=>onDeleteTheme(theme.id)} title="Supprimer" style={{ background:"none",border:"none",cursor:"pointer",color:"transparent",padding:"2px 4px",flexShrink:0,display:"flex",transition:"color .15s" }} onMouseEnter={e=>e.currentTarget.style.color="#f87171"} onMouseLeave={e=>e.currentTarget.style.color="transparent"}>{Ic.close(10)}</button>
              </div>
              {open&&theme.sousThemes.map(st=>{
                const active=activePath[0]===theme.id&&activePath[1]===st.id;
                const label=stTitles?.[st.id]||st.titre;
                return (
                  <div key={st.id} style={{ display:"flex",alignItems:"stretch",padding:"1px 8px 1px 0" }}>
                    <button onClick={()=>onSelect(theme.id,st.id)} style={{ flex:1,textAlign:"left",padding:"7px 8px 7px 30px",background:active?"rgba(10,132,255,0.18)":"none",border:"none",cursor:"pointer",borderRadius:active?"10px":0,color:active?"var(--l1)":"var(--l3)",fontSize:12.5,lineHeight:1.45,transition:"all .15s" }}>
                      <span style={{ marginRight:6,opacity:.4 }}>·</span>{label}
                    </button>
                    <button onClick={()=>onDeleteST(theme.id,st.id)} title="Supprimer" style={{ background:"none",border:"none",cursor:"pointer",color:"transparent",fontSize:12,padding:"0 10px 0 4px",flexShrink:0,display:"flex",alignItems:"center",transition:"color .15s" }} onMouseEnter={e=>e.currentTarget.style.color="#f87171"} onMouseLeave={e=>e.currentTarget.style.color="transparent"}>{Ic.close(9)}</button>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      <div style={{ padding:"10px 14px",borderTop:"1px solid var(--sep)",flexShrink:0 }}>
        <button onClick={onAddTheme} style={{ width:"100%",padding:"8px 12px",background:"rgba(255,255,255,0.06)",border:"1px dashed rgba(255,255,255,0.16)",borderRadius:10,color:"var(--l4)",cursor:"pointer",fontSize:12,fontFamily:"inherit",textAlign:"left",display:"flex",alignItems:"center",gap:6,transition:"all .18s" }} onMouseEnter={e=>{e.currentTarget.style.background="rgba(10,132,255,0.16)";e.currentTarget.style.color="#60a5fa";e.currentTarget.style.borderColor="rgba(10,132,255,0.45)";}} onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.06)";e.currentTarget.style.color="var(--l4)";e.currentTarget.style.borderColor="rgba(255,255,255,0.16)";}}>
          {Ic.plus(12)} Ajouter un thème
        </button>
        <div style={{ marginTop:8,fontSize:10,color:"var(--l4)",textAlign:"center" }}>{themes.length} thème{themes.length!==1?"s":""} · {totalST} sous-thème{totalST!==1?"s":""}</div>
      </div>
    </aside>
  );
};

const SubjectApp = ({ subject, user, onBack, onOpenAccount }) => {

  const [themes,setThemes]=useState(()=>{ const saved=localStorage.getItem(themesKey); if(saved){try{return JSON.parse(saved);}catch{}} if(subject.id==="subj_dnl") return DNL_DEFAULT_THEMES; return []; });
  const saveThemes=(t)=>{ setThemes(t); localStorage.setItem(themesKey,JSON.stringify(t)); };
  const addTheme=()=>{ const id=`th_${Date.now()}`; const next=[...themes,{id,titre:`Thème ${themes.length+1}`,sousThemes:[]}]; saveThemes(next); setExpanded(prev=>{const n=new Set(prev);n.add(id);return n;}); };
  const deleteTheme=(themeId)=>{ if(!confirm("Supprimer ce thème et tous ses sous-thèmes ?")) return; const next=themes.filter(t=>t.id!==themeId); saveThemes(next); if(activePath[0]===themeId){const flat=next.flatMap(t=>t.sousThemes.map(s=>({tId:t.id,sId:s.id}))); setActivePath(flat.length>0?[flat[0].tId,flat[0].sId]:[null,null]);} };
  const addST=(themeId)=>{ const id=`st_${Date.now()}`; const theme=themes.find(t=>t.id===themeId); const newST={id,titre:`Sous-thème ${(theme?.sousThemes?.length||0)+1}`}; const next=themes.map(t=>t.id===themeId?{...t,sousThemes:[...t.sousThemes,newST]}:t); saveThemes(next); setActivePath([themeId,id]); setTab("dossier"); };
  const deleteST=(themeId,stId)=>{ if(!confirm("Supprimer ce sous-thème ?")) return; const next=themes.map(t=>t.id===themeId?{...t,sousThemes:t.sousThemes.filter(s=>s.id!==stId)}:t); saveThemes(next); if(activePath[1]===stId){const flat=next.flatMap(t=>t.sousThemes.map(s=>({tId:t.id,sId:s.id}))); setActivePath(flat.length>0?[flat[0].tId,flat[0].sId]:[null,null]);} };
  const allSTs=themes.flatMap(t=>t.sousThemes.map(st=>({themeId:t.id,st})));
  const [activePath,setActivePath]=useState(()=>{ if(themes.length>0&&themes[0].sousThemes.length>0) return [themes[0].id,themes[0].sousThemes[0].id]; return [null,null]; });
  const [tab,setTab]=useState("dossier"), [expanded,setExpanded]=useState(new Set());
  const [stTitles,setStTitles]=useState(()=>{ const init={}; themes.forEach(t=>t.sousThemes.forEach(st=>{const s=localStorage.getItem(`${st.id}_titre`);if(s)init[st.id]=s;})); return init; });
  useEffect(()=>{ const init={}; themes.forEach(t=>t.sousThemes.forEach(st=>{const s=localStorage.getItem(`${st.id}_titre`);if(s)init[st.id]=s;})); setStTitles(init); },[themes]);
  const activeTheme=themes.find(t=>t.id===activePath[0]);
  const activeST=activeTheme?.sousThemes.find(s=>s.id===activePath[1]);
  const currentIdx=allSTs.findIndex(x=>x.st.id===activePath[1]);
  const goTo=(idx)=>{ if(idx<0||idx>=allSTs.length) return; setActivePath([allSTs[idx].themeId,allSTs[idx].st.id]); };
  const TABS=["dossier","mindmap","quiz"];
  const TAB_LABELS={ dossier:"Dossier", mindmap:"Mindmap", quiz:"Quiz" };

  return (
    <div style={{ height:"100vh",display:"flex",fontFamily:"-apple-system,'SF Pro Display','SF Pro Text','Helvetica Neue',Inter,sans-serif",color:"var(--l1)" }}>
      {isMobile&&sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{ position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:50 }} />}
      <div style={isMobile?{position:"fixed",top:0,left:0,bottom:0,zIndex:60,transform:sidebarOpen?"translateX(0)":"translateX(-100%)",transition:"transform .25s ease"}:{width:sidebarOpen?240:0,flexShrink:0,overflow:"hidden",transition:"width .25s ease"}}>
        <Sidebar themes={themes} activePath={activePath} onSelect={(tId,stId)=>{setActivePath([tId,stId]);if(isMobile)setSidebarOpen(false);}} stTitles={stTitles} onAddTheme={addTheme} onDeleteTheme={deleteTheme} onAddST={addST} onDeleteST={deleteST} subjectNom={subject.nom} subjectSoustitre={subject.soustitre} />
      </div>

      <div style={{ flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0 }}>
        <header data-np style={{ height:50,flexShrink:0,background:"rgba(255,255,255,0.06)",backdropFilter:"blur(32px) saturate(180%)",WebkitBackdropFilter:"blur(32px) saturate(180%)",borderBottom:"1px solid var(--sep)",display:"flex",alignItems:"center",padding:"0 14px",gap:8 }}>
          <button onClick={()=>setSidebarOpen(o=>!o)} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--l3)",padding:"4px 5px",display:"flex",alignItems:"center",flexShrink:0 }}>{Ic.menu(18)}</button>
          <button onClick={onBack} style={{ display:"flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",color:"var(--l3)",fontSize:13,padding:"5px 8px",borderRadius:8,transition:"all .15s",fontFamily:"inherit" }} onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.08)";e.currentTarget.style.color="var(--l1)";}} onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.color="var(--l3)";}}>
            {Ic.back(14)} Lobby
          </button>
          <div style={{ width:1,height:16,background:"var(--sep)" }} />
          <div style={{ width:8,height:8,borderRadius:"50%",background:subject.couleur,flexShrink:0 }} />
          <span style={{ fontSize:14,fontWeight:700,color:"var(--l1)" }}>{subject.nom}</span>
          {!isMobile&&subject.soustitre&&<><div style={{ width:1,height:16,background:"var(--sep)" }} /><span style={{ fontSize:12,color:"var(--l3)" }}>{subject.soustitre}</span></>}
          <div style={{ flex:1 }} />
          {!isMobile&&allSTs.length>0&&<span style={{ fontSize:11,color:"var(--l4)" }}>{currentIdx+1} / {allSTs.length}</span>}
          <button onClick={()=>window.print()} style={{ display:"flex",alignItems:"center",gap:5,padding:"5px 11px",background:"rgba(255,255,255,0.07)",color:"var(--l3)",border:"1px solid var(--sep)",borderRadius:9,cursor:"pointer",fontSize:12 }}>{Ic.print(14)} PDF</button>
          <button onClick={onOpenAccount} style={{ width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#0A84FF,#5856D6)",border:"none",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0,boxShadow:"0 2px 8px rgba(10,132,255,0.40)" }}>{(user?.email?.[0]||"?").toUpperCase()}</button>
        </header>

        <div style={{ flex:1,display:"flex",overflow:"hidden" }}>
          <div style={{ flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0 }}>
            {allSTs.length===0 ? (
              <div style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,color:"var(--l3)",padding:40,textAlign:"center" }}>
                <div style={{ color:"var(--l4)" }}>{Ic.pdf(44)}</div>
                <div style={{ fontSize:16,fontWeight:700,color:"var(--l2)" }}>Aucun contenu</div>
                <div style={{ fontSize:14,maxWidth:280,lineHeight:1.6,color:"var(--l3)" }}>Ajoute un thème depuis le menu latéral, puis des sous-thèmes pour commencer.</div>
              </div>
            ) : (
              <>
                <div style={{ background:"rgba(255,255,255,0.05)",backdropFilter:"blur(18px) saturate(160%)",WebkitBackdropFilter:"blur(18px) saturate(160%)",borderBottom:"1px solid var(--sep)",padding:"10px 22px 0",flexShrink:0 }}>
                  <div style={{ fontSize:11,color:"var(--l4)",marginBottom:8 }}>
                    {activeTheme&&(localStorage.getItem(`theme_${activeTheme.id}_titre`)||activeTheme.titre)}
                    {" "}&rsaquo;{" "}
                    <span style={{ color:"var(--blue)" }}>{stTitles[activeST?.id]||activeST?.titre}</span>
                  </div>
                  <div data-np style={{ display:"inline-flex",background:"rgba(255,255,255,0.06)",borderRadius:50,padding:"3px",gap:2 }}>
                    {TABS.map(t=>(
                      <button key={t} onClick={()=>setTab(t)} style={{ padding:isMobile?"8px 16px":"6px 16px",background:tab===t?"rgba(10,132,255,0.22)":"none",border:"none",cursor:"pointer",fontSize:13,color:tab===t?"#0A84FF":"var(--l3)",fontWeight:tab===t?600:400,borderRadius:50,transition:"all .15s",fontFamily:"inherit" }}>
                        {TAB_LABELS[t]}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{ flex:1,minHeight:0,display:"flex",flexDirection:"column",overflow:"hidden" }}>
                  {tab==="dossier"&&activeST&&<div style={{ flex:1,overflowY:"auto" }}><DossierView key={activeST.id} st={activeST} sid={activeST.id} onTitleChange={title=>setStTitles(prev=>({...prev,[activeST.id]:title}))} /></div>}
                  {tab==="mindmap"&&activeST&&<MindmapCanvas key={activeST.id} sid={activeST.id} />}
                  {tab==="quiz"&&activeST&&<QuizView key={activeST.id} sid={activeST.id} />}
                </div>

                <div data-np style={{ height:52,flexShrink:0,background:"rgba(255,255,255,0.06)",backdropFilter:"blur(18px) saturate(160%)",WebkitBackdropFilter:"blur(18px) saturate(160%)",borderTop:"1px solid var(--sep)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 22px" }}>
                  <button onClick={()=>goTo(currentIdx-1)} disabled={currentIdx<=0} style={{ padding:"7px 18px",borderRadius:50,border:"none",background:currentIdx>0?"rgba(255,255,255,0.09)":"transparent",color:currentIdx>0?"var(--l2)":"var(--l4)",cursor:currentIdx>0?"pointer":"default",fontSize:13,fontWeight:500 }}>← Précédent</button>
                  <span style={{ fontSize:12,color:"var(--l4)" }}>{currentIdx+1} / {allSTs.length}</span>
                  <button onClick={()=>goTo(currentIdx+1)} disabled={currentIdx>=allSTs.length-1} style={{ padding:"7px 20px",borderRadius:50,border:"none",background:currentIdx<allSTs.length-1?"var(--blue)":"transparent",color:currentIdx<allSTs.length-1?"#fff":"var(--l4)",cursor:currentIdx<allSTs.length-1?"pointer":"default",fontSize:13,fontWeight:600,boxShadow:currentIdx<allSTs.length-1?"0 2px 12px rgba(10,132,255,0.40)":"none" }}>Suivant →</button>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

// ════════════════════════════════════════════════════════════════
//  APP
// ════════════════════════════════════════════════════════════════
const App = () => {
  const [user,setUser]=useState(null), [authReady,setAuthReady]=useState(false), [syncing,setSyncing]=useState(false);
  const [screen,setScreen]=useState("lobby"), [activeSubjectId,setActiveSubjectId]=useState(null);
  const [showAccount,setShowAccount]=useState(false), [showAddSubject,setShowAddSubject]=useState(false);
  const SUBJECTS_KEY="app_subjects";
  const [subjects,setSubjects]=useState(()=>{ try{const s=localStorage.getItem(SUBJECTS_KEY);return s?JSON.parse(s):DEFAULT_SUBJECTS;}catch{return DEFAULT_SUBJECTS;} });
  const saveSubjects=(s)=>{ setSubjects(s); localStorage.setItem(SUBJECTS_KEY,JSON.stringify(s)); };
  const readSubjectThemes=(subjs)=>{
    const map={};
    subjs.forEach(subj=>{ const key=`subj_${subj.id}_themes`; const saved=localStorage.getItem(key); if(saved){try{map[subj.id]=JSON.parse(saved);return;}catch{}} if(subj.id==="subj_dnl"){map[subj.id]=DNL_DEFAULT_THEMES;return;} map[subj.id]=[]; });
    return map;
  };
  const [subjectThemes,setSubjectThemes]=useState(()=>readSubjectThemes((()=>{try{const s=localStorage.getItem(SUBJECTS_KEY);return s?JSON.parse(s):DEFAULT_SUBJECTS;}catch{return DEFAULT_SUBJECTS;}})()));

  useEffect(()=>{
    _sb.auth.getSession().then(async({data:{session}})=>{
      if(session?.user){ _uid=session.user.id; setSyncing(true); await loadUserData(session.user.id).catch(console.warn); _flushSyncQueue(); setSyncing(false); setUser(session.user); const s=localStorage.getItem(SUBJECTS_KEY); if(s){try{const parsed=JSON.parse(s);setSubjects(parsed);setSubjectThemes(readSubjectThemes(parsed));}catch{}} }
      setAuthReady(true);
    });
    const {data:{subscription}}=_sb.auth.onAuthStateChange(async(event,session)=>{
      if(event==="SIGNED_IN"&&session?.user){
        if(_uid===session.user.id){setUser(session.user);setAuthReady(true);return;}
        _uid=session.user.id; setSyncing(true); await loadUserData(session.user.id).catch(console.warn); _flushSyncQueue(); setSyncing(false); setUser(session.user); setAuthReady(true);
        const s=localStorage.getItem(SUBJECTS_KEY); if(s){try{const parsed=JSON.parse(s);setSubjects(parsed);setSubjectThemes(readSubjectThemes(parsed));}catch{}}
      } else if(event==="SIGNED_OUT"){ _uid=null; _clearLocalData(); setUser(null); }
    });
    return()=>subscription.unsubscribe();
  },[]);

  if(!authReady) return <div style={{ height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--l3)",fontSize:15 }}>Chargement…</div>;
  if(!user) return <LoginScreen />;
  if(syncing) return <div style={{ height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,color:"var(--l3)" }}><div style={{ fontSize:32,animation:"blob1 1.5s linear infinite",color:"var(--blue)" }}>⟳</div><div style={{ fontSize:14 }}>Synchronisation…</div></div>;

  const addSubject=({nom,soustitre,couleur,emoji})=>{ const id=`subj_${Date.now()}`; const newSubj={id,nom,soustitre,couleur,emoji}; const next=[...subjects,newSubj]; saveSubjects(next); localStorage.setItem(`subj_${id}_themes`,JSON.stringify([])); setSubjectThemes(prev=>({...prev,[id]:[]})); };
  const deleteSubject=(id)=>{ if(!confirm("Supprimer cette matière et tout son contenu ?")) return; const next=subjects.filter(s=>s.id!==id); saveSubjects(next); setSubjectThemes(prev=>{const n={...prev};delete n[id];return n;}); };
  const handleOpenSubject=(id)=>{ setActiveSubjectId(id); setScreen("subject"); };
  const handleBack=()=>{ setSubjectThemes(readSubjectThemes(subjects)); setScreen("lobby"); };
  const activeSubject=subjects.find(s=>s.id===activeSubjectId);

  return (
    <>
      {screen==="lobby"&&<SubjectLobby user={user} subjects={subjects} subjectThemes={subjectThemes} onOpenSubject={handleOpenSubject} onAddSubject={()=>setShowAddSubject(true)} onDeleteSubject={deleteSubject} onOpenAccount={()=>setShowAccount(true)} />}
      {screen==="subject"&&activeSubject&&<SubjectApp key={activeSubjectId} subject={activeSubject} user={user} onBack={handleBack} onOpenAccount={()=>setShowAccount(true)} />}
      {showAccount&&<AccountModal user={user} onClose={()=>setShowAccount(false)} />}
      {showAddSubject&&<AddSubjectModal onClose={()=>setShowAddSubject(false)} onAdd={addSubject} />}
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
